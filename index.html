<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PokéVault</title>

<style>
body{font-family:system-ui;background:#f5f5f5;margin:0;padding:15px}
h1{font-size:28px}

.stats{display:flex;gap:10px;margin:15px 0;flex-wrap:wrap}
.stat{background:#fff;padding:10px;border-radius:12px;flex:1;text-align:center}
.stat.dark{background:#111;color:#fff}

.card{background:#fff;padding:12px;border-radius:12px;margin:10px 0}
.name{font-weight:700;font-size:16px}
.meta{font-size:12px;color:#777;margin-top:4px}

.value{font-size:18px;font-weight:800}

.green{color:#15803d}
.red{color:#dc2626}
.blue{color:#2563eb}

.badge{padding:4px 10px;border-radius:20px;font-size:11px;margin-right:5px}
.H{background:#d1fae5}
.G{background:#dbeafe}
.T{background:#fed7aa}
.S{background:#fecaca}

.manage{margin-top:8px;padding:6px 12px;border:none;border-radius:8px;background:#111;color:#fff}

input,select{width:100%;padding:10px;border-radius:10px;border:1px solid #ddd;margin-top:6px}
button.add{margin-top:10px;width:100%;padding:12px;border:none;background:#111;color:#fff;border-radius:10px}

</style>
</head>

<body>

<h1>PokéVault</h1>

<div class="stats">
  <div class="stat dark"><strong id="inventory">$0</strong><div>Inventory</div></div>
  <div class="stat"><strong id="cards">0</strong><div>Cards</div></div>
  <div class="stat"><strong id="sold">$0</strong><div>Total Sold</div></div>
  <div class="stat"><strong id="pl">+$0</strong><div>P/L</div></div>
</div>

<input id="name" placeholder="Card name">
<input id="value" type="number" placeholder="Cost">
<input id="psa" type="number" placeholder="PSA10 estimate">

<select id="bucket">
  <option value="H">Hold</option>
  <option value="G">Grade</option>
  <option value="T">Trade</option>
  <option value="S">Sell</option>
</select>

<button class="add" onclick="addCard()">Add Card</button>

<div id="list"></div>

<script>

let cards = JSON.parse(localStorage.getItem("cards")||"[]")

function money(x){return "$"+Number(x||0).toLocaleString()}

function analyze(c){
  const cost = Number(c.value||0)
  const sale = Number(c.salePrice||0)
  const psa = Number(c.psa||0)

  const profit = sale - cost
  const roi = cost ? Math.round((profit/cost)*100) : 0

  let signal="HOLD", cls="green"

  if(c.status==="sold"){
    if(profit>0){signal="PROFIT";cls="green"}
    else if(profit<0){signal="LOSS";cls="red"}
    else{signal="EVEN";cls="blue"}
  }else{
    if(psa>=cost*2 && psa>0){signal="GRADE";cls="blue"}
    else if(psa<=cost*1.3 && psa>0){signal="SELL";cls="red"}
  }

  return {cost,sale,psa,profit,roi,signal,cls}
}

function render(){

  let inv=0,sold=0,pl=0

  document.getElementById("list").innerHTML = cards.map(c=>{
    const a=analyze(c)

    if(c.status!=="sold") inv+=a.cost
    if(c.status==="sold"){
      sold+=a.sale
      pl+=a.profit
    }

    return `
    <div class="card">
      <div class="name">${c.name}</div>

      <span class="badge ${c.bucket}">${c.bucket}</span>
      <span class="${a.cls}">${a.signal}</span>

      <div class="meta">Cost ${money(a.cost)} · PSA ${money(a.psa)}</div>

      ${c.status==="sold"?`
        <div class="meta">
          Sold ${money(a.sale)}<br>
          <b class="${a.cls}">
            ${a.profit>=0?"+":""}${money(a.profit)} (${a.roi}%)
          </b>
        </div>
      `:""}

      <button class="manage" onclick="manage(${c.id})">Manage</button>
    </div>
    `
  }).join("")

  document.getElementById("inventory").innerText = money(inv)
  document.getElementById("cards").innerText = cards.length
  document.getElementById("sold").innerText = money(sold)
  document.getElementById("pl").innerText = (pl>=0?"+":"")+money(pl)
}

function addCard(){
  const card={
    id:Date.now(),
    name:name.value,
    value:Number(value.value),
    psa:Number(psa.value),
    bucket:bucket.value,
    status:"active"
  }
  cards.push(card)
  save()
}

function manage(id){
  let c = cards.find(x=>x.id===id)

  let choice = prompt(
`1 Hold
2 Grade
3 Trade
4 Sell
5 Mark Sold
6 Delete`)

  if(choice=="1") c.bucket="H"
  if(choice=="2") c.bucket="G"
  if(choice=="3") c.bucket="T"
  if(choice=="4") c.bucket="S"

  if(choice=="5"){
    let price = prompt("Sale price?")
    c.salePrice = Number(price)
    c.status="sold"
  }

  if(choice=="6"){
    cards = cards.filter(x=>x.id!==id)
  }

  save()
}

function save(){
  localStorage.setItem("cards",JSON.stringify(cards))
  render()
}

render()

</script>

</body>
</html>
