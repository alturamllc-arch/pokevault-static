<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PokéVault</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#0c0c0f;
  color:#fff;
  font-family:Arial,sans-serif;
}
#app{
  max-width:480px;
  margin:auto;
  padding:18px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}
h1{margin:0;font-size:30px}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}
.stat{
  background:#17171f;
  border:1px solid #262635;
  border-radius:14px;
  padding:12px;
  text-align:center;
}
.stat strong{display:block;font-size:20px}
.stat span{font-size:11px;color:#aaa}
.panel{
  background:#15151d;
  border:1px solid #2a2a38;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #333344;
  background:#0f0f16;
  color:#fff;
  margin-bottom:10px;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
button{
  border:0;
  border-radius:10px;
  padding:12px;
  font-weight:700;
  cursor:pointer;
}
.primary{background:#7c3aed;color:white}
.danger{background:#ef4444;color:white}
.secondary{background:#252536;color:white}
.tabs{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:12px;
}
.tab{
  background:#17171f;
  color:#aaa;
  border:1px solid #292938;
}
.tab.active{
  background:#7c3aed;
  color:#fff;
}
.filters{
  display:flex;
  gap:8px;
  overflow-x:auto;
  margin-bottom:12px;
}
.filter{
  background:#17171f;
  color:#aaa;
  border:1px solid #292938;
  white-space:nowrap;
  padding:9px 12px;
}
.filter.active{
  background:#252536;
  color:#fff;
  border-color:#7c3aed;
}
.card{
  background:#17171f;
  border:1px solid #292938;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}
.card-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.name{font-weight:800}
.meta{font-size:12px;color:#aaa;margin-top:4px}
.value{font-weight:900;color:#86efac}
.bucket{
  display:inline-block;
  margin-top:8px;
  padding:4px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}
.H{background:#14532d;color:#86efac}
.G{background:#1e3a8a;color:#93c5fd}
.T{background:#7c2d12;color:#fdba74}
.S{background:#7f1d1d;color:#fca5a5}
.empty{text-align:center;color:#777;padding:40px 0}
.sheet-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:flex-end;
  z-index:999;
}
.sheet{
  width:100%;
  max-width:480px;
  margin:0 auto;
  background:#15151d;
  border:1px solid #2a2a38;
  border-radius:22px 22px 0 0;
  padding:18px;
}
.sheet h3{margin:0 0 6px;font-size:20px}
.sheet p{margin:0 0 16px;color:#aaa;font-size:13px}
.sheet-grid{display:grid;gap:10px}
.sheet-btn{
  width:100%;
  text-align:left;
  background:#20202b;
  color:white;
  border:1px solid #333344;
  padding:14px;
  border-radius:12px;
}
.sheet-btn small{
  display:block;
  color:#aaa;
  margin-top:3px;
}
.close-btn{
  margin-top:12px;
  width:100%;
  background:#333344;
  color:white;
}
</style>
</head>

<body>
<div id="app"></div>

<script>
const KEY = "pokevault_cards_v3"

let cards = JSON.parse(localStorage.getItem(KEY) || "[]")
let activeTab = "inventory"
let activeAnchor = "All"
let selectedCardId = null

const bucketLabels = {
  H: "HOLD",
  G: "GRADE",
  T: "TRADE",
  S: "SELL"
}

function getAnchor(name){
  const n = String(name || "").toLowerCase()
  if(n.includes("pikachu") || n.includes("pichu")) return "Pikachu"
  if(n.includes("charizard") || n.includes("charmeleon")) return "Charizard"
  if(n.includes("umbreon")) return "Umbreon"
  return "Other"
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(cards))
}

function addCard(){
  const name = document.getElementById("name").value.trim()
  const value = Number(document.getElementById("value").value || 0)
  const type = document.getElementById("type").value
  const bucket = document.getElementById("bucket").value

  if(!name) return alert("Enter card name")

  cards.push({
    id: Date.now(),
    name,
    value,
    type,
    bucket,
    status: "active",
    createdAt: new Date().toISOString()
  })

  save()
  render()
}

function resetForm(){
  setTimeout(() => {
    const name = document.getElementById("name")
    const value = document.getElementById("value")
    if(name) name.value = ""
    if(value) value.value = ""
  }, 0)
}

function clearAll(){
  if(!confirm("Delete everything?")) return
  cards = []
  save()
  render()
}

function openManage(id){
  selectedCardId = id
  render()
}

function closeManage(){
  selectedCardId = null
  render()
}

function moveCard(bucket){
  const card = cards.find(c => c.id === selectedCardId)
  if(!card) return
  card.bucket = bucket
  card.status = "active"
  save()
  closeManage()
}

function markSold(){
  const card = cards.find(c => c.id === selectedCardId)
  if(!card) return

  const price = prompt("Sale price?", card.value || 0)
  if(price === null) return

  card.status = "sold"
  card.salePrice = Number(price || 0)
  card.soldAt = new Date().toISOString()

  save()
  closeManage()
}

function markTraded(){
  const card = cards.find(c => c.id === selectedCardId)
  if(!card) return
  card.status = "traded"
  card.tradedAt = new Date().toISOString()
  save()
  closeManage()
}

function deleteCard(){
  if(!confirm("Delete permanently? Only use this for mistakes.")) return
  cards = cards.filter(c => c.id !== selectedCardId)
  save()
  closeManage()
}

function render(){
  const app = document.getElementById("app")
  const q = document.getElementById("search")?.value.toLowerCase() || ""

  const inventoryCards = cards.filter(c => !c.status || c.status === "active")
  const soldCards = cards.filter(c => c.status === "sold")
  const tradedCards = cards.filter(c => c.status === "traded")

  let visible = []
  if(activeTab === "inventory") visible = inventoryCards
  if(activeTab === "sold") visible = soldCards
  if(activeTab === "traded") visible = tradedCards

  visible = visible.filter(c => {
    if(activeAnchor !== "All" && getAnchor(c.name) !== activeAnchor) return false
    if(q && !c.name.toLowerCase().includes(q)) return false
    return true
  })

  const total = inventoryCards.reduce((s,c)=>s+Number(c.value||0),0)
  const slabs = inventoryCards.filter(c=>c.type==="Slab").length

  app.innerHTML = `
    <div class="header">
      <h1>PokéVault</h1>
      <button onclick="clearAll()" class="danger">Reset</button>
    </div>

    <div class="stats">
      <div class="stat"><strong>$${total.toLocaleString()}</strong><span>Inventory</span></div>
      <div class="stat"><strong>${inventoryCards.length}</strong><span>Active</span></div>
      <div class="stat"><strong>${slabs}</strong><span>Slabs</span></div>
    </div>

    <div class="panel">
      <input id="name" placeholder="Card name" />
      <div class="row">
        <input id="value" type="number" placeholder="Value $" />
        <select id="type">
          <option value="Raw">Raw</option>
          <option value="Slab">Slab</option>
        </select>
      </div>
      <select id="bucket">
        <option value="H">Hold</option>
        <option value="G">Grade</option>
        <option value="T">Trade</option>
        <option value="S">Sell</option>
      </select>
      <button class="primary" style="width:100%" onclick="addCard(); resetForm();">Add Card</button>
    </div>

    <div class="tabs">
      <button class="tab ${activeTab==="inventory"?"active":""}" onclick="activeTab='inventory'; render()">Inventory</button>
      <button class="tab ${activeTab==="sold"?"active":""}" onclick="activeTab='sold'; render()">Sold</button>
      <button class="tab ${activeTab==="traded"?"active":""}" onclick="activeTab='traded'; render()">Traded</button>
    </div>

    <div class="filters">
      ${["All","Pikachu","Charizard","Umbreon","Other"].map(a => `
        <button class="filter ${activeAnchor===a?"active":""}" onclick="activeAnchor='${a}'; render()">${a}</button>
      `).join("")}
    </div>

    <input id="search" placeholder="Search cards..." oninput="render()" value="${q}" />

    <div id="list">
      ${visible.length === 0 ? `<div class="empty">No cards here</div>` : visible.map(c => `
        <div class="card">
          <div class="card-top">
            <div>
              <div class="name">${c.name}</div>
              <div class="meta">${c.type} · ${getAnchor(c.name)} · ${bucketLabels[c.bucket]}</div>
              <span class="bucket ${c.bucket}">${bucketLabels[c.bucket]}</span>
              ${c.status==="sold" ? `<div class="meta">Sold: $${Number(c.salePrice || c.value || 0).toLocaleString()} · ${new Date(c.soldAt).toLocaleDateString()}</div>` : ""}
              ${c.status==="traded" ? `<div class="meta">Traded: ${new Date(c.tradedAt).toLocaleDateString()}</div>` : ""}
            </div>
            <div style="text-align:right">
              <div class="value">$${Number(c.value||0).toLocaleString()}</div>
              <button class="primary" onclick="openManage(${c.id})">Manage</button>
            </div>
          </div>
        </div>
      `).join("")}
    </div>

    ${selectedCardId ? actionSheet() : ""}
  `
}

function actionSheet(){
  const c = cards.find(card => card.id === selectedCardId)
  if(!c) return ""

  return `
    <div class="sheet-backdrop" onclick="closeManage()">
      <div class="sheet" onclick="event.stopPropagation()">
        <h3>${c.name}</h3>
        <p>${c.type} · ${getAnchor(c.name)} · ${bucketLabels[c.bucket]} · $${Number(c.value||0).toLocaleString()}</p>

        <div class="sheet-grid">
          <button class="sheet-btn" onclick="moveCard('H')">
            Move to HOLD
            <small>Keep in collection</small>
          </button>

          <button class="sheet-btn" onclick="moveCard('G')">
            Move to GRADE
            <small>Candidate for grading</small>
          </button>

          <button class="sheet-btn" onclick="moveCard('T')">
            Move to TRADE
            <small>Available for trades</small>
          </button>

          <button class="sheet-btn" onclick="moveCard('S')">
            Move to SELL
            <small>Still active inventory, marked for sale</small>
          </button>

          <button class="sheet-btn" onclick="markSold()">
            Mark as SOLD
            <small>Moves to sales history, not deleted</small>
          </button>

          <button class="sheet-btn" onclick="markTraded()">
            Mark as TRADED
            <small>Moves to trade history, not deleted</small>
          </button>

          <button class="sheet-btn danger" onclick="deleteCard()">
            Delete Permanently
            <small>Only for mistakes</small>
          </button>
        </div>

        <button class="close-btn" onclick="closeManage()">Cancel</button>
      </div>
    </div>
  `
}

render()
</script>
</body>
</html>
