<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>PokéVault v10.4</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#06070b;
  --card:#11131a;
  --card2:#181b24;
  --glass:rgba(255,255,255,.06);

  --text:#f5f7ff;
  --muted:#8b93a7;

  --line:rgba(255,255,255,.08);

  --green:#4ade80;
  --blue:#7ea6ff;
  --red:#ff6b6b;
  --gold:#f6c343;
  --purple:#b27cff;
}

html{
  background:#05060a;
}

body{
  margin:0;

  background:
    radial-gradient(circle at top,#182033 0%,#090b12 42%,#040509 100%);

  color:var(--text);

  font-family:
    Inter,
    Arial,
    sans-serif;

  overflow-x:hidden;
}

/* ===================================================== */
/* APP */
/* ===================================================== */

#app{
  width:100%;
  max-width:480px;

  margin:auto;

  min-height:100vh;

  padding:
    max(12px,env(safe-area-inset-top))
    14px
    150px;
}

/* ===================================================== */
/* TOP */
/* ===================================================== */

.top{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:12px;
}

h1{
  margin:0;

  font-size:30px;
  font-weight:900;

  letter-spacing:-1px;
}

/* ===================================================== */
/* BUTTONS */
/* ===================================================== */

.roundBtn,
.filterBtn{
  border:none;

  background:rgba(255,255,255,.08);

  color:white;

  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 10px 28px rgba(0,0,0,.35);

  transition:.15s;
}

.roundBtn{
  width:54px;
  height:54px;

  border-radius:22px;

  font-size:22px;
}

.filterBtn{
  width:58px;
  height:58px;

  border-radius:22px;

  font-size:22px;
  font-weight:900;
}

.roundBtn:active,
.filterBtn:active,
.card:active,
.navBtn:active,
.fab:active{
  transform:scale(.96);
}

/* ===================================================== */
/* SEARCH */
/* ===================================================== */

.searchRow{
  display:flex;
  gap:12px;

  margin-bottom:10px;
}

.search{
  flex:1;

  border:none;

  height:58px;

  padding:0 20px;

  border-radius:22px;

  background:rgba(255,255,255,.07);

  color:white;

  font-size:17px;

  backdrop-filter:blur(16px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 10px 26px rgba(0,0,0,.22);
}

.search::placeholder{
  color:#9aa3b8;
}

/* ===================================================== */
/* FILTER SUMMARY */
/* ===================================================== */

.filterSummary{
  background:rgba(255,255,255,.06);

  border-radius:18px;

  padding:13px 16px;

  margin-bottom:10px;

  font-size:12px;
  font-weight:900;

  color:#c2c8d6;

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 8px 22px rgba(0,0,0,.22);
}

/* ===================================================== */
/* STATS */
/* ===================================================== */

.stats{
  display:grid;

  grid-template-columns:repeat(4,1fr);

  gap:10px;

  margin:10px 0 14px;
}

.stat{
  background:rgba(255,255,255,.07);

  border-radius:22px;

  padding:14px 8px;

  text-align:center;

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    0 12px 28px rgba(0,0,0,.26);
}

.stat strong{
  display:block;

  font-size:15px;
  font-weight:900;

  margin-bottom:7px;
}

.stat span{
  font-size:10px;
  font-weight:900;

  color:#9ba3b7;

  letter-spacing:.8px;
}

/* ===================================================== */
/* GRID */
/* ===================================================== */

.grid{
  display:grid;

  grid-template-columns:1fr;

  gap:12px;
}

.gridMode{
  grid-template-columns:1fr 1fr;
}

/* ===================================================== */
/* CARD */
/* ===================================================== */

.card{
  position:relative;

  overflow:hidden;

  border-radius:30px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.02)
    );

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(18px);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.08),
    0 20px 40px rgba(0,0,0,.34);

  transition:.16s;
}

/* ===================================================== */
/* IMAGE */
/* ===================================================== */

.cardImage{
  position:relative;

  height:205px;

  overflow:hidden;

  border-radius:24px 24px 0 0;

  background:#111;
}

.gridMode .cardImage{
  height:210px;
}

.cardImage img{
  width:100%;
  height:100%;

  object-fit:cover;

  display:block;
}

.cardImage::after{
  content:"";

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  height:48%;

  background:
    linear-gradient(
      180deg,
      transparent,
      rgba(0,0,0,.78)
    );
}

/* ===================================================== */
/* CARD CONTENT */
/* ===================================================== */

.cardTop{
  position:absolute;

  left:0;
  right:0;
  bottom:0;

  padding:14px;
}

.name{
  font-size:17px;
  font-weight:900;

  line-height:1.1;

  margin-bottom:5px;

  color:white;

  text-shadow:0 2px 10px rgba(0,0,0,.45);
}

.meta{
  font-size:12px;

  color:#c8d0df;

  margin-bottom:10px;
}

.value{
  position:absolute;

  right:14px;
  bottom:48px;

  text-align:right;

  font-size:17px;
  font-weight:900;

  color:white;

  text-shadow:0 2px 10px rgba(0,0,0,.5);
}

.small{
  position:absolute;

  right:14px;
  bottom:28px;

  font-size:11px;

  color:#c8d0df;
}

/* ===================================================== */
/* BADGES */
/* ===================================================== */

.badge,
.signal{
  display:inline-flex;

  align-items:center;
  justify-content:center;

  height:31px;

  padding:0 13px;

  border-radius:999px;

  font-size:11px;
  font-weight:900;

  margin-right:6px;

  backdrop-filter:blur(10px);

  border:1px solid rgba(255,255,255,.06);
}

.H{
  background:rgba(87,143,100,.92);
  color:white;
}

.G{
  background:rgba(103,130,210,.92);
  color:white;
}

.T{
  background:rgba(227,142,74,.92);
  color:white;
}

.S{
  background:rgba(201,82,82,.92);
  color:white;
}

.W{
  background:rgba(133,92,248,.92);
  color:white;
}

.signal{
  background:rgba(255,255,255,.1);

  color:#7df0a8;
}

/* ===================================================== */
/* FAB */
/* ===================================================== */

.fab{
  position:fixed;

  right:max(22px,calc(50vw - 220px));

  bottom:108px;

  width:78px;
  height:78px;

  border:none;

  border-radius:30px;

  background:#f6c343;

  color:black;

  font-size:42px;
  font-weight:300;

  box-shadow:
    0 16px 36px rgba(246,195,67,.32),
    0 4px 20px rgba(0,0,0,.45);

  z-index:50;
}

/* ===================================================== */
/* BOTTOM NAV */
/* ===================================================== */

.bottomNav{
  position:fixed;

  left:50%;
  transform:translateX(-50%);

  bottom:18px;

  width:calc(100% - 24px);
  max-width:450px;

  padding:10px;

  border-radius:34px;

  background:rgba(8,10,18,.78);

  backdrop-filter:blur(22px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 20px 44px rgba(0,0,0,.5);

  display:grid;

  grid-template-columns:repeat(5,1fr);

  z-index:60;
}

.navBtn{
  border:none;

  background:transparent;

  color:#b7bfd1;

  border-radius:22px;

  padding:12px 4px;

  font-size:12px;
  font-weight:900;

  transition:.16s;
}

.navBtn.active{
  background:rgba(255,255,255,.08);

  color:white;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 10px 24px rgba(0,0,0,.3);
}

.navIcon{
  display:block;

  font-size:22px;

  margin-bottom:4px;
}

/* ===================================================== */
/* EMPTY */
/* ===================================================== */

.empty{
  background:rgba(255,255,255,.05);

  border-radius:28px;

  padding:40px 22px;

  text-align:center;

  border:1px solid rgba(255,255,255,.06);
}

.emptyTitle{
  font-size:22px;
  font-weight:900;

  margin:8px 0;
}

.emptyText{
  color:#9ea8bc;
}

.green{color:#4ade80!important}
.red{color:#ff6b6b!important}
.blue{color:#7ea6ff!important}
.purple{color:#b27cff!important}
.gold{color:#f6c343!important}

@media(max-width:420px){

  .gridMode{
    grid-template-columns:1fr;
  }

  .stats{
    grid-template-columns:repeat(2,1fr);
  }

}

</style>
</head>

<body>

<div id="app">

  <div class="top">
    <h1>PokéVault</h1>

    <button class="roundBtn">
      ⚙️
    </button>
  </div>

  <div class="searchRow">

    <input
      class="search"
      placeholder="Search cards..."
    />

    <button class="filterBtn">
      ⌘
    </button>

  </div>

  <div class="filterSummary">
    PHASE 10.4 • STABLE BUILD
  </div>

  <div class="stats">

    <div class="stat">
      <strong>$12.8K</strong>
      <span>VALUE</span>
    </div>

    <div class="stat">
      <strong>148</strong>
      <span>CARDS</span>
    </div>

    <div class="stat">
      <strong class="green">+12%</strong>
      <span>MONTH</span>
    </div>

    <div class="stat">
      <strong>7</strong>
      <span>GRAILS</span>
    </div>

  </div>

  <div class="grid gridMode">

    <div class="card">

      <div class="cardImage">

        <img src="https://images.pokemontcg.io/base1/4_hires.png">

        <div class="cardTop">

          <div class="name">
            Charizard
          </div>

          <div class="meta">
            Base Set • PSA 9
          </div>

          <div class="badge H">
            HOLD
          </div>

          <div class="signal">
            ▲ 12%
          </div>

        </div>

      </div>

      <div class="value gold">
        $4,850
      </div>

      <div class="small">
        Last Sale
      </div>

    </div>

    <div class="card">

      <div class="cardImage">

        <img src="https://images.pokemontcg.io/base1/2_hires.png">

        <div class="cardTop">

          <div class="name">
            Blastoise
          </div>

          <div class="meta">
            Base Set • PSA 8
          </div>

          <div class="badge G">
            GROW
          </div>

          <div class="signal">
            ▲ 7%
          </div>

        </div>

      </div>

      <div class="value">
        $1,720
      </div>

      <div class="small">
        Last Sale
      </div>

    </div>

  </div>

</div>

<button class="fab">
  +
</button>

<div class="bottomNav">

  <button class="navBtn active">
    <span class="navIcon">🏠</span>
    Home
  </button>

  <button class="navBtn">
    <span class="navIcon">📈</span>
    Market
  </button>

  <button class="navBtn">
    <span class="navIcon">➕</span>
    Add
  </button>

  <button class="navBtn">
    <span class="navIcon">⭐</span>
    Grails
  </button>

  <button class="navBtn">
    <span class="navIcon">👤</span>
    Profile
  </button>

</div>

<script>

window.onerror=function(msg,url,line,col,error){

  document.body.innerHTML=`

    <div style="
      padding:24px;
      font-family:Arial;
      background:#05060a;
      color:white;
      min-height:100vh;
    ">

      <h2 style="margin-top:0">
        PokéVault Crash
      </h2>

      <p>
        <b>Error:</b> ${msg}
      </p>

      <p>
        <b>Line:</b> ${line}
      </p>

    </div>

  `;

};

document.querySelectorAll(".navBtn").forEach(btn=>{

  btn.onclick=()=>{

    document
      .querySelectorAll(".navBtn")
      .forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

  };

});

document.querySelector(".fab").onclick=()=>{

  alert("Add card flow");

};

console.log("PokéVault v10.4 Stable Loaded");

</script>

</body>
</html>
