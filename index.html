<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PokéVault</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#0c0c0f;
  color:#fff;
  font-family:Arial,sans-serif;
}
#app{
  max-width:480px;
  margin:auto;
  padding:18px;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}
h1{margin:0;font-size:28px}
.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-bottom:14px;
}
.stat{
  background:#17171f;
  border:1px solid #262635;
  border-radius:14px;
  padding:12px;
  text-align:center;
}
.stat strong{display:block;font-size:20px}
.stat span{font-size:11px;color:#aaa}
.panel{
  background:#15151d;
  border:1px solid #2a2a38;
  border-radius:16px;
  padding:14px;
  margin-bottom:14px;
}
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #333344;
  background:#0f0f16;
  color:#fff;
  margin-bottom:10px;
}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
button{
  border:0;
  border-radius:10px;
  padding:12px;
  font-weight:700;
  cursor:pointer;
}
.primary{background:#7c3aed;color:white;width:100%}
.danger{background:#ef4444;color:white}
.card{
  background:#17171f;
  border:1px solid #292938;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}
.card-top{
  display:flex;
  justify-content:space-between;
  gap:10px;
}
.name{font-weight:800}
.meta{font-size:12px;color:#aaa;margin-top:4px}
.value{font-weight:900;color:#86efac}
.bucket{
  display:inline-block;
  margin-top:8px;
  padding:4px 9px;
  border-radius:999px;
  font-size:11px;
  font-weight:800;
}
.H{background:#14532d;color:#86efac}
.G{background:#1e3a8a;color:#93c5fd}
.T{background:#7c2d12;color:#fdba74}
.S{background:#7f1d1d;color:#fca5a5}
.empty{text-align:center;color:#777;padding:40px 0}
</style>
</head>

<body>
<div id="app">
  <div class="header">
    <h1>PokéVault</h1>
    <button onclick="clearAll()" class="danger">Reset</button>
  </div>

  <div class="stats">
    <div class="stat"><strong id="total">$0</strong><span>Total</span></div>
    <div class="stat"><strong id="count">0</strong><span>Cards</span></div>
    <div class="stat"><strong id="slabs">0</strong><span>Slabs</span></div>
  </div>

  <div class="panel">
    <input id="name" placeholder="Card name" />
    <div class="row">
      <input id="value" type="number" placeholder="Value $" />
      <select id="type">
        <option value="Raw">Raw</option>
        <option value="Slab">Slab</option>
      </select>
    </div>
    <select id="bucket">
      <option value="H">Hold</option>
      <option value="G">Grade</option>
      <option value="T">Trade</option>
      <option value="S">Sell</option>
    </select>
    <button class="primary" onclick="addCard()">Add Card</button>
  </div>

  <input id="search" placeholder="Search cards..." oninput="render()" />

  <div id="list"></div>
</div>

<script>
const KEY = "pokevault_cards_v2"

let cards = JSON.parse(localStorage.getItem(KEY) || "[]")

const bucketLabels = {
  H: "HOLD",
  G: "GRADE",
  T: "TRADE",
  S: "SELL"
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(cards))
}

function addCard(){
  const name = document.getElementById("name").value.trim()
  const value = Number(document.getElementById("value").value || 0)
  const type = document.getElementById("type").value
  const bucket = document.getElementById("bucket").value

  if(!name) return alert("Enter card name")

  cards.push({
    id: Date.now(),
    name,
    value,
    type,
    bucket
  })

  save()
  document.getElementById("name").value = ""
  document.getElementById("value").value = ""
  render()
}

function deleteCard(id){
  if(!confirm("Remove this card?")) return
  cards = cards.filter(c => c.id !== id)
  save()
  render()
}

function clearAll(){
  if(!confirm("Delete all cards?")) return
  cards = []
  save()
  render()
}

function render(){
  const q = document.getElementById("search")?.value.toLowerCase() || ""
  const filtered = cards.filter(c => c.name.toLowerCase().includes(q))

  const total = cards.reduce((s,c)=>s+Number(c.value||0),0)
  const slabs = cards.filter(c=>c.type==="Slab").length

  document.getElementById("total").textContent = "$" + total.toLocaleString()
  document.getElementById("count").textContent = cards.length
  document.getElementById("slabs").textContent = slabs

  const list = document.getElementById("list")

  if(filtered.length === 0){
    list.innerHTML = `<div class="empty">No cards yet</div>`
    return
  }

  list.innerHTML = filtered.map(c => `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="name">${c.name}</div>
          <div class="meta">${c.type} · ${bucketLabels[c.bucket]}</div>
          <span class="bucket ${c.bucket}">${bucketLabels[c.bucket]}</span>
        </div>
        <div style="text-align:right">
          <div class="value">$${Number(c.value||0).toLocaleString()}</div>
          <button class="danger" onclick="deleteCard(${c.id})">Delete</button>
        </div>
      </div>
    </div>
  `).join("")
}

render()
</script>
</body>
</html>
