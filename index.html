<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PokéVault</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#f7f7f8;
  color:#111;
  font-family:Arial,sans-serif;
}
#app{
  max-width:480px;
  margin:auto;
  padding:20px;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:18px;
}
h1{margin:0;font-size:34px;font-weight:900}
.iconBtn{
  width:64px;height:64px;border-radius:18px;
  background:#181818;color:#fff;border:none;font-size:28px;
}
.tabs{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;
}
.tab{
  border:none;padding:16px;border-radius:18px;font-size:18px;font-weight:800;
  background:#eee;color:#777;
}
.tab.active{background:#181818;color:#fff}
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;
}
.stat{
  background:#eee;border-radius:16px;padding:14px 8px;text-align:center;
}
.stat.dark{background:#181818;color:#fff}
.stat strong{display:block;font-size:22px;color:#111}
.stat.dark strong{color:#fff}
.stat span{font-size:12px;color:#777}
.stat.dark span{color:#bbb}
.green{color:#15803d!important}
.red{color:#dc2626!important}
.neutral{color:#111!important}
.search{
  width:100%;border:none;background:#eee;border-radius:18px;
  padding:18px;font-size:18px;margin-bottom:14px;
}
.pills{
  display:flex;gap:10px;overflow-x:auto;margin-bottom:14px;
}
.pill{
  border:none;border-radius:999px;padding:14px 20px;font-weight:800;
  font-size:15px;white-space:nowrap;
}
.H{background:#6f936a;color:#fff}
.G{background:#6687c2;color:#fff}
.T{background:#e28a55;color:#fff}
.S{background:#c76565;color:#fff}
.anchor{background:#eef0ed;color:#666}
.anchor.active{background:#181818;color:#fff}
.form{
  background:#fff;padding:16px;border-radius:20px;margin-bottom:18px;
  box-shadow:0 4px 16px rgba(0,0,0,.05);
}
input,select{
  width:100%;border:none;background:#f0f0f0;border-radius:14px;
  padding:14px;font-size:16px;margin-bottom:10px;
}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.addBtn{
  width:100%;background:#181818;color:#fff;border:none;
  border-radius:14px;padding:15px;font-size:16px;font-weight:900;
}
.card{
  background:#fff;border-radius:18px;padding:16px;margin-bottom:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.06);
}
.cardTop{display:flex;justify-content:space-between;gap:12px}
.name{font-size:17px;font-weight:900}
.meta{font-size:13px;color:#777;margin-top:5px;line-height:1.4}
.value{font-size:18px;font-weight:900;color:#111}
.badge{
  display:inline-block;margin-top:10px;border-radius:999px;padding:6px 12px;
  font-size:12px;font-weight:900;
}
.manage{
  margin-top:10px;background:#181818;color:#fff;border:none;
  border-radius:12px;padding:10px 14px;font-weight:800;
}
.empty{text-align:center;color:#777;padding:40px}
.sheetBack{
  position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:flex-end;z-index:999;
}
.sheet{
  width:100%;max-width:480px;margin:auto;background:#fff;
  border-radius:26px 26px 0 0;padding:20px;
}
.sheet h3{margin:0 0 6px;font-size:22px}
.sheet p{margin:0 0 16px;color:#777}
.sheetBtn{
  width:100%;text-align:left;border:none;background:#f1f1f1;
  border-radius:16px;padding:15px;margin-bottom:10px;font-size:15px;font-weight:900;
}
.sheetBtn small{display:block;color:#777;margin-top:4px;font-weight:500}
.danger{background:#fee2e2;color:#991b1b}
.close{
  width:100%;border:none;background:#181818;color:#fff;
  border-radius:16px;padding:15px;font-weight:900;
}
</style>
</head>

<body>
<div id="app"></div>

<script>
const KEY = "pokevault_cards_final"

let cards = JSON.parse(localStorage.getItem(KEY) || "[]")
let activeTab = "inventory"
let activeAnchor = "All"
let activeBucket = "All"
let selectedCardId = null

const bucketLabels = {
  H: "HOLD",
  G: "GRADE",
  T: "TRADE",
  S: "SELL"
}

function save(){
  localStorage.setItem(KEY, JSON.stringify(cards))
}

function getAnchor(name){
  const n = String(name || "").toLowerCase()
  if(n.includes("pikachu") || n.includes("pichu")) return "Pikachu"
  if(n.includes("umbreon")) return "Umbreon"
  if(n.includes("charizard") || n.includes("charmeleon")) return "Charizard"
  return "Other"
}

function addCard(){
  const name = document.getElementById("name").value.trim()
  const value = Number(document.getElementById("value").value || 0)
  const type = document.getElementById("type").value
  const bucket = document.getElementById("bucket").value

  if(!name) return alert("Enter card name")

  cards.push({
    id: Date.now(),
    name,
    value,
    type,
    bucket,
    status:"active",
    createdAt:new Date().toISOString()
  })

  save()
  render()
}

function openManage(id){
  selectedCardId = id
  render()
}

function closeManage(){
  selectedCardId = null
  render()
}

function moveCard(bucket){
  const c = cards.find(x => x.id === selectedCardId)
  if(!c) return
  c.bucket = bucket
  c.status = "active"
  delete c.salePrice
  delete c.soldAt
  delete c.tradedFor
  delete c.tradedAt
  save()
  closeManage()
}

function markSold(){
  const c = cards.find(x => x.id === selectedCardId)
  if(!c) return

  const sale = prompt("Sale price?", c.value || 0)
  if(sale === null) return

  c.status = "sold"
  c.salePrice = Number(sale || 0)
  c.soldAt = new Date().toISOString()

  save()
  closeManage()
}

function markTraded(){
  const c = cards.find(x => x.id === selectedCardId)
  if(!c) return

  const tradeFor = prompt("Traded for what?", "")
  if(tradeFor === null) return

  c.status = "traded"
  c.tradedFor = tradeFor
  c.tradedAt = new Date().toISOString()

  save()
  closeManage()
}

function deleteCard(){
  if(!confirm("Delete permanently? Only use this for mistakes.")) return
  cards = cards.filter(c => c.id !== selectedCardId)
  save()
  closeManage()
}

function resetAll(){
  if(!confirm("Delete all data?")) return
  cards = []
  save()
  render()
}

function render(){
  const app = document.getElementById("app")
  const q = document.getElementById("search")?.value.toLowerCase() || ""

  const inventory = cards.filter(c => !c.status || c.status === "active")
  const sold = cards.filter(c => c.status === "sold")
  const traded = cards.filter(c => c.status === "traded")
  const history = [...sold, ...traded]

  const inventoryValue = inventory.reduce((s,c)=>s+Number(c.value||0),0)
  const totalSold = sold.reduce((s,c)=>s+Number(c.salePrice||0),0)
  const totalProfit = sold.reduce((s,c)=>s+(Number(c.salePrice||0)-Number(c.value||0)),0)

  let visible = activeTab === "inventory" ? inventory : history

  visible = visible.filter(c => {
    if(activeAnchor !== "All" && getAnchor(c.name) !== activeAnchor) return false
    if(activeBucket !== "All" && c.bucket !== activeBucket) return false
    if(q && !c.name.toLowerCase().includes(q)) return false
    return true
  })

  const slabs = inventory.filter(c=>c.type==="Slab").length
  const raw = inventory.filter(c=>c.type==="Raw").length

  app.innerHTML = `
    <div class="top">
      <h1>PokéVault</h1>
      <button class="iconBtn" onclick="resetAll()">↻</button>
    </div>

    <div class="tabs">
      <button class="tab ${activeTab==="inventory"?"active":""}" onclick="activeTab='inventory';render()">▱ Inventory (${inventory.length})</button>
      <button class="tab ${activeTab==="history"?"active":""}" onclick="activeTab='history';render()">↺ History (${history.length})</button>
    </div>

    <div class="stats">
      <div class="stat dark"><strong>$${inventoryValue.toLocaleString()}</strong><span>Inventory Value</span></div>
      <div class="stat"><strong>${inventory.length}</strong><span>Cards</span></div>
      <div class="stat"><strong>${slabs}</strong><span>Slabs</span></div>
      <div class="stat"><strong>${raw}</strong><span>Raw</span></div>
    </div>

    <div class="stats">
      <div class="stat dark"><strong class="green">$${totalSold.toLocaleString()}</strong><span>Total Sold</span></div>
      <div class="stat"><strong class="${totalProfit>0?"green":totalProfit<0?"red":"neutral"}">${totalProfit>=0?"+":""}$${totalProfit.toLocaleString()}</strong><span>Profit/Loss</span></div>
      <div class="stat"><strong>${sold.length}</strong><span>Sold</span></div>
      <div class="stat"><strong>${traded.length}</strong><span>Traded</span></div>
    </div>

    <div class="form">
      <input id="name" placeholder="Card name" />
      <div class="row">
        <input id="value" type="number" placeholder="Original Value $" />
        <select id="type">
          <option value="Raw">Raw</option>
          <option value="Slab">Slab</option>
        </select>
      </div>
      <select id="bucket">
        <option value="H">Hold</option>
        <option value="G">Grade</option>
        <option value="T">Trade</option>
        <option value="S">Sell</option>
      </select>
      <button class="addBtn" onclick="addCard()">Add Card</button>
    </div>

    <input id="search" class="search" placeholder="Search cards..." oninput="render()" value="${q}" />

    <div class="pills">
      ${["H","G","T","S"].map(b => `
        <button class="pill ${b}" onclick="activeBucket=activeBucket==='${b}'?'All':'${b}';render()">
          ${bucketLabels[b]}
        </button>
      `).join("")}
    </div>

    <div class="pills">
      ${["All","Pikachu","Umbreon","Charizard","Other"].map(a => `
        <button class="pill anchor ${activeAnchor===a?"active":""}" onclick="activeAnchor='${a}';render()">
          ${a}
        </button>
      `).join("")}
    </div>

    <div>
      ${visible.length === 0 ? `<div class="empty">No cards here</div>` : visible.map(cardHTML).join("")}
    </div>

    ${selectedCardId ? sheetHTML() : ""}
  `
}

function cardHTML(c){
  const original = Number(c.value || 0)
  const sale = Number(c.salePrice || 0)
  const diff = sale - original
  const diffClass = diff > 0 ? "green" : diff < 0 ? "red" : "neutral"

  return `
    <div class="card">
      <div class="cardTop">
        <div>
          <div class="name">${c.name}</div>
          <div class="meta">${c.type} · ${getAnchor(c.name)} · ${bucketLabels[c.bucket]}</div>
          <span class="badge ${c.bucket}">${bucketLabels[c.bucket]}</span>

          ${c.status==="sold" ? `
            <div class="meta">
              Sold for <b class="${diffClass}">$${sale.toLocaleString()}</b>
              · Original $${original.toLocaleString()}
              · <b class="${diffClass}">${diff>=0?"+":""}$${diff.toLocaleString()}</b>
            </div>
          ` : ""}

          ${c.status==="traded" ? `
            <div class="meta">Traded for: ${c.tradedFor || "Not specified"}</div>
          ` : ""}
        </div>

        <div style="text-align:right">
          <div class="value">$${original.toLocaleString()}</div>
          <button class="manage" onclick="openManage(${c.id})">Manage</button>
        </div>
      </div>
    </div>
  `
}

function sheetHTML(){
  const c = cards.find(x => x.id === selectedCardId)
  if(!c) return ""

  return `
    <div class="sheetBack" onclick="closeManage()">
      <div class="sheet" onclick="event.stopPropagation()">
        <h3>${c.name}</h3>
        <p>${c.type} · ${getAnchor(c.name)} · ${bucketLabels[c.bucket]} · $${Number(c.value||0).toLocaleString()}</p>

        <button class="sheetBtn" onclick="moveCard('H')">Move to HOLD<small>Keep in collection</small></button>
        <button class="sheetBtn" onclick="moveCard('G')">Move to GRADE<small>Candidate for grading</small></button>
        <button class="sheetBtn" onclick="moveCard('T')">Move to TRADE<small>Available for trades</small></button>
        <button class="sheetBtn" onclick="moveCard('S')">Move to SELL<small>Still active inventory, marked for sale</small></button>
        <button class="sheetBtn" onclick="markSold()">Mark as SOLD<small>Enter final sale price</small></button>
        <button class="sheetBtn" onclick="markTraded()">Mark as TRADED<small>Record what you got</small></button>
        <button class="sheetBtn danger" onclick="deleteCard()">Delete Permanently<small>Only for mistakes</small></button>

        <button class="close" onclick="closeManage()">Cancel</button>
      </div>
    </div>
  `
}

render()
</script>
</body>
</html>
