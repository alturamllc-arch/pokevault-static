<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
/>

<title>PokéVault</title>

<style>

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#0c0e13;
  --surface:#161922;
  --text:#f5f7ff;
  --muted:#9aa3b8;

  --gold:#f6c343;
  --green:#4ade80;
  --blue:#7ea6ff;
  --red:#ff6b6b;
  --purple:#b27cff;
}

/* ========================================================= */
/* BODY */
/* ========================================================= */

body{
  margin:0;

  background:
    radial-gradient(
      circle at top,
      #1f2533 0%,
      #0f1219 45%,
      #06070b 100%
    );

  color:var(--text);

  font-family:Arial,sans-serif;

  overflow-x:hidden;
}

/* ========================================================= */
/* APP */
/* ========================================================= */

#app{
  max-width:480px;

  margin:auto;

  min-height:100vh;

  padding:
    10px
    12px
    130px;
}

/* ========================================================= */
/* TOP */
/* ========================================================= */

.top{
  display:flex;
  align-items:center;
  justify-content:space-between;

  margin-bottom:8px;
}

h1{
  margin:0;

  font-size:28px;
  font-weight:900;

  letter-spacing:-1px;
}

/* ========================================================= */
/* BUTTONS */
/* ========================================================= */

.roundBtn{
  width:48px;
  height:48px;

  border:none;

  border-radius:18px;

  background:rgba(255,255,255,.07);

  color:white;

  font-size:20px;

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 10px 24px rgba(0,0,0,.22);
}

.roundBtn:active{
  transform:scale(.95);
}

/* ========================================================= */
/* SEARCH */
/* ========================================================= */

.searchRow{
  display:flex;
  gap:10px;

  margin-bottom:8px;
}

.search{
  flex:1;

  border:none;

  height:52px;

  padding:0 18px;

  border-radius:18px;

  background:rgba(255,255,255,.06);

  color:white;

  font-size:15px;

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 8px 20px rgba(0,0,0,.16);
}

.search::placeholder{
  color:#97a0b5;
}

.filterBtn{
  width:52px;
  height:52px;

  border:none;

  border-radius:18px;

  background:rgba(255,255,255,.07);

  color:white;

  font-size:18px;
  font-weight:900;

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 8px 20px rgba(0,0,0,.16);
}

/* ========================================================= */
/* FILTER SUMMARY */
/* ========================================================= */

.filterSummary{
  background:rgba(255,255,255,.05);

  border-radius:16px;

  padding:10px 14px;

  margin-bottom:8px;

  font-size:11px;
  font-weight:900;

  color:#aab2c4;

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);
}

/* ========================================================= */
/* STATS */
/* ========================================================= */

.stats{
  display:grid;

  grid-template-columns:repeat(4,1fr);

  gap:8px;

  margin:8px 0 10px;
}

.stat{
  background:rgba(255,255,255,.05);

  border-radius:18px;

  padding:10px 4px;

  text-align:center;

  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 8px 20px rgba(0,0,0,.14);
}

.stat strong{
  display:block;

  font-size:14px;
  font-weight:900;

  margin-bottom:4px;
}

.stat span{
  font-size:8px;
  font-weight:900;

  color:#98a1b4;

  text-transform:uppercase;
}

/* ========================================================= */
/* GRID */
/* ========================================================= */

.grid{
  display:grid;

  grid-template-columns:1fr;

  gap:14px;
}

.gridMode{
  grid-template-columns:1fr 1fr;
}

.oneCard{
  grid-template-columns:1fr!important;
}

.oneCard .card{
  max-width:260px;
}

/* ========================================================= */
/* CARD */
/* ========================================================= */

.card{
  display:flex;
  flex-direction:column;

  overflow:hidden;

  border-radius:28px;

  background:
    linear-gradient(
      180deg,
      rgba(255,255,255,.06),
      rgba(255,255,255,.03)
    );

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(18px);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    0 18px 38px rgba(0,0,0,.32);

  transition:
    transform .16s ease,
    box-shadow .16s ease;

  min-height:340px;
}

.card:active{
  transform:scale(.985);
}

/* ========================================================= */
/* IMAGE */
/* ========================================================= */

.cardImage{
  position:relative;

  width:100%;

  aspect-ratio:3/4;

  overflow:hidden;

  background:#0f1117;

  border-bottom:1px solid rgba(255,255,255,.06);
}

.cardImage img{
  width:100%;
  height:100%;

  object-fit:cover;

  display:block;
}

.cardImage::after{
  content:"";

  position:absolute;

  left:0;
  right:0;
  bottom:0;

  height:38%;

  background:
    linear-gradient(
      180deg,
      transparent,
      rgba(0,0,0,.72)
    );
}

.cardImageFallback{
  width:100%;
  height:100%;

  display:flex;
  align-items:center;
  justify-content:center;

  background:
    linear-gradient(
      135deg,
      #171a24,
      #0d0f15
    );

  color:#343c4f;

  font-size:42px;
  font-weight:900;
}

/* ========================================================= */
/* CONTENT */
/* ========================================================= */

.cardTop{
  display:flex;
  flex-direction:column;

  flex:1;

  padding:14px;

  min-height:128px;
}

.name{
  font-size:16px;
  font-weight:900;

  line-height:1.12;

  color:white;

  margin-bottom:6px;

  display:-webkit-box;

  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;

  overflow:hidden;
}

.meta{
  font-size:11px;

  line-height:1.35;

  color:#aab4c7;

  margin-bottom:10px;

  display:-webkit-box;

  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;

  overflow:hidden;
}

/* ========================================================= */
/* BOTTOM */
/* ========================================================= */

.cardBottom{
  margin-top:auto;

  display:flex;
  align-items:flex-end;
  justify-content:space-between;

  gap:8px;
}

/* ========================================================= */
/* BADGES */
/* ========================================================= */

.badgeWrap{
  display:flex;
  flex-wrap:wrap;

  gap:6px;
}

.badge,
.signal{
  display:inline-flex;

  align-items:center;
  justify-content:center;

  min-height:28px;

  padding:0 11px;

  border-radius:999px;

  font-size:10px;
  font-weight:900;

  border:1px solid rgba(255,255,255,.06);

  white-space:nowrap;

  backdrop-filter:blur(10px);
}

.signal{
  background:rgba(255,255,255,.08);

  color:#9fe8b5;
}

.H{
  background:rgba(104,145,106,.92);
  color:white;
}

.G{
  background:rgba(105,133,215,.92);
  color:white;
}

.T{
  background:rgba(227,141,78,.92);
  color:white;
}

.S{
  background:rgba(200,90,90,.92);
  color:white;
}

.W{
  background:rgba(142,96,255,.92);
  color:white;
}

/* ========================================================= */
/* VALUE */
/* ========================================================= */

.valueWrap{
  text-align:right;

  flex-shrink:0;
}

.value{
  font-size:17px;
  font-weight:900;

  line-height:1;
}

.small{
  font-size:10px;
  font-weight:800;

  color:#9ca6ba;

  margin-top:4px;
}

/* ========================================================= */
/* GRID SCALE */
/* ========================================================= */

.gridMode .card{
  min-height:315px;
}

.gridMode .name{
  font-size:14px;
}

.gridMode .meta{
  font-size:10px;
}

.gridMode .value{
  font-size:15px;
}

/* ========================================================= */
/* EMPTY */
/* ========================================================= */

.empty{
  background:rgba(255,255,255,.05);

  border-radius:26px;

  padding:34px 20px;

  text-align:center;

  border:1px solid rgba(255,255,255,.07);
}

.emptyTitle{
  font-size:20px;
  font-weight:900;

  margin:8px 0;
}

.emptyText{
  color:#9ca6ba;

  font-size:13px;
}

/* ========================================================= */
/* FAB */
/* ========================================================= */

.fab{
  position:fixed;

  right:max(18px,calc(50vw - 220px));

  bottom:88px;

  width:62px;
  height:62px;

  border:none;

  border-radius:24px;

  background:#f6c343;

  color:#111;

  font-size:34px;

  box-shadow:
    0 18px 34px rgba(0,0,0,.35),
    0 0 30px rgba(246,195,67,.22);

  z-index:30;
}

/* ========================================================= */
/* NAV */
/* ========================================================= */

.bottomNav{
  position:fixed;

  left:50%;
  transform:translateX(-50%);

  bottom:14px;

  width:calc(100% - 34px);
  max-width:430px;

  padding:7px;

  border-radius:28px;

  background:rgba(13,16,22,.78);

  backdrop-filter:blur(24px);

  border:1px solid rgba(255,255,255,.08);

  box-shadow:
    0 20px 40px rgba(0,0,0,.45);

  display:grid;

  grid-template-columns:repeat(5,1fr);

  z-index:40;
}

.navBtn{
  border:none;

  background:transparent;

  color:#a6afc1;

  border-radius:18px;

  padding:8px 2px;

  font-size:10px;
  font-weight:900;
}

.navBtn.active{
  background:rgba(255,255,255,.08);

  color:white;
}

.navIcon{
  display:block;

  font-size:18px;

  margin-bottom:3px;
}

/* ========================================================= */
/* COLORS */
/* ========================================================= */

.green{color:#4ade80!important}
.red{color:#ff6b6b!important}
.blue{color:#7ea6ff!important}
.purple{color:#b27cff!important}
.gold{color:#f6c343!important}

.grailText{
  color:#f6c343!important;

  text-shadow:
    0 0 12px rgba(246,195,67,.45);
}

/* ========================================================= */
/* MOBILE */
/* ========================================================= */

@media (max-width:390px){

  .grid{
    gap:10px;
  }

  .card{
    border-radius:24px;
  }

  .cardTop{
    padding:12px;
  }

  .name{
    font-size:14px;
  }

  .value{
    font-size:15px;
  }

}

</style>

</head>

<body>

<div id="app"></div>

<script>

const cards=[
  {
    id:1,
    name:"Pikachu Test",
    value:23,
    bucket:"H",
    type:"Raw",
    imageUrl:"https://images.pokemontcg.io/base1/58_hires.png",
    favorite:true
  },
  {
    id:2,
    name:"Charizard Test",
    value:50,
    bucket:"G",
    type:"Raw",
    imageUrl:"https://images.pokemontcg.io/base1/4_hires.png"
  }
]

const buckets={
  H:"HOLD",
  G:"GRADE",
  T:"TRADE",
  S:"SELL",
  W:"WISHLIST"
}

function money(n){
  return "$"+Number(n||0)
}

function getAnchor(name){

  const n=name.toLowerCase()

  if(n.includes("pikachu")) return "Pikachu"
  if(n.includes("charizard")) return "Charizard"

  return "Pokemon"
}

function cardHTML(c){

  return `
    <div class="card">

      <div class="cardImage">

        ${
          c.imageUrl
          ? `<img src="${c.imageUrl}" />`
          : `<div class="cardImageFallback">▧</div>`
        }

      </div>

      <div class="cardTop">

        <div>

          <div class="name">
            ${c.favorite?`<span class="grailText">★</span>`:""}
            ${c.name}
          </div>

          <div class="meta">
            ${c.type} · ${getAnchor(c.name)}
          </div>

        </div>

        <div class="cardBottom">

          <div class="badgeWrap">

            <span class="badge ${c.bucket}">
              ${buckets[c.bucket]}
            </span>

            <span class="signal">
              STRONG
            </span>

          </div>

          <div class="valueWrap">

            <div class="value">
              ${money(c.value)}
            </div>

            <div class="small">
              Cost
            </div>

          </div>

        </div>

      </div>

    </div>
  `
}

function render(){

  document.getElementById("app").innerHTML=`

    <div class="top">

      <button class="roundBtn">☁</button>

      <h1>PokéVault</h1>

      <button class="roundBtn">♡</button>

    </div>

    <div class="searchRow">

      <input
        class="search"
        placeholder="Search collection"
      />

      <button class="filterBtn">
        ☰
      </button>

    </div>

    <div class="filterSummary">
      View: GRID · Sort: NEWEST · Folder: ALL
    </div>

    <div class="stats">

      <div class="stat">
        <strong>$73</strong>
        <span>Inventory</span>
      </div>

      <div class="stat">
        <strong>2</strong>
        <span>Owned</span>
      </div>

      <div class="stat">
        <strong class="green">$0</strong>
        <span>Returned</span>
      </div>

      <div class="stat">
        <strong class="green">+$0</strong>
        <span>Realized</span>
      </div>

    </div>

    <div class="grid gridMode">

      ${cards.map(cardHTML).join("")}

    </div>

    <button class="fab">
      +
    </button>

    <div class="bottomNav">

      <button class="navBtn active">
        <span class="navIcon">▦</span>
        Vault
      </button>

      <button class="navBtn">
        <span class="navIcon">♡</span>
        Wishlist
      </button>

      <button class="navBtn">
        <span class="navIcon">▤</span>
        Analytics
      </button>

      <button class="navBtn">
        <span class="navIcon">◉</span>
        Profile
      </button>

      <button class="navBtn">
        <span class="navIcon">⌕</span>
        Search
      </button>

    </div>

  `
}

render()

</script>

</body>
</html>
