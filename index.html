<head>

<title>PokéVault v10.4.1</title>

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{

body{

.roundBtn{

<body>
<div id="app"></div>

<script>
window.onerror=function(msg,url,line,col,error){
  document.body.innerHTML=`
    <div style="padding:24px;font-family:Arial;background:#05060a;color:white;min-height:100vh;">
      <h2>PokéVault Crash</h2>
      <p><b>Error:</b> ${msg}</p>
      <p><b>Line:</b> ${line}</p>
    </div>
  `;
};

const KEY="pokevault_v1_phase10_4_1_fixed"
let cards=JSON.parse(
  localStorage.getItem(KEY)||
  localStorage.getItem("pokevault_v1_phase10_4_fixed")||
  localStorage.getItem("pokevault_v1_phase10_4")||
  localStorage.getItem("pokevault_v1_phase10_3")||
  localStorage.getItem("pokevault_v1_phase9")||
  localStorage.getItem("pokevault_v1_phase8")||
  "[]"
)

let screen="vault"
let previousScreen="vault"
let filterStatus="All"
let filterBucket="All"
let filterAnchor="All"
let filterFolder="All"
let searchText=""
let sortMode="newest"
let viewMode="grid"
let filtersOpen=false
let sheet=null
let selectedId=null
let advancedAdd=false

const buckets={H:"HOLD",G:"GRADE",T:"TRADE",S:"SELL",W:"WISHLIST"}
const reasons={flip:"Quick Flip",cash:"Need Cash",drop:"Market Drop",overpay:"Overpaid",upgrade:"Upgrade Capital"}

function save(){localStorage.setItem(KEY,JSON.stringify(cards));render()}
function money(n){return "$"+Number(n||0).toLocaleString()}
function safe(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}

function titleCaseName(str){
  const keep=["PSA","GX","EX","V","VMAX","VSTAR","SAR","SIR","TG","SV","JP","EN"]
  return String(str||"").trim().split(/\s+/).map(w=>{
    const clean=w.replace(/[^a-zA-Z0-9]/g,"").toUpperCase()
    if(keep.includes(clean))return clean
    return w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()
  }).join(" ")
}

function getAnchor(name){
  const n=String(name||"").toLowerCase()
  if(n.includes("pikachu")||n.includes("pichu"))return"Pikachu"
  if(n.includes("charizard")||n.includes("charmeleon"))return"Charizard"
  if(n.includes("umbreon"))return"Umbreon"
  if(n.includes("mew"))return"Mew"
  return"Other"
}

function accentClass(c){
  const a=getAnchor(c.name)
  if(a==="Pikachu")return"accent-pikachu"
  if(a==="Charizard")return"accent-charizard"
  if(a==="Umbreon")return"accent-umbreon"
  if(a==="Mew")return"accent-mew"
  return""
}

function shortFolder(folder){
  if(!folder)return"All"
  if(folder.includes("Personal"))return"Personal"
  if(folder.includes("Business"))return"Business"
  if(folder.includes("Grading"))return"Grading"
  if(folder.includes("For Sale"))return"For Sale"
  return folder
}

function hasImage(c){return c.imageUrl&&String(c.imageUrl).trim().length>5}

function imageBox(c,kind="card"){
  const cls=kind==="detail"?"detailImageHero":"cardImage"
  const accent=accentClass(c)
  if(hasImage(c)){
    return `<div class="${cls} ${accent}"><img src="${safe(c.imageUrl)}" alt="${safe(c.name)}" onerror="this.parentElement.innerHTML='${c.favorite?"★":"▧"}';this.parentElement.classList.add('${c.favorite?"grailText":""}')" /></div>`
  }
  return `<div class="${cls} ${accent} ${c.favorite?"grailText":""}">${c.favorite?"★":"▧"}</div>`
}

function analyze(c){
  const cost=Number(c.value||0),psa=Number(c.psa||0),sale=Number(c.salePrice||0),target=Number(c.targetBuy||0)
  const profit=sale-cost,roi=cost?Math.round((profit/cost)*100):0,upside=psa-cost
  const potentialPct=cost&&psa?Math.round((upside/cost)*100):0
  let signal="HOLD",cls="green"
  if(c.status==="wishlist"){signal=target?"WATCH":"WISHLIST";cls="purple"}
  else if(c.status==="sold"){signal=profit>0?"PROFIT":profit<0?"LOSS":"EVEN";cls=profit>0?"green":profit<0?"red":"neutral"}
  else if(c.status==="traded"){signal="TRADED";cls="blue"}
  else if(psa&&cost&&psa>=cost*2){signal="GRADE";cls="blue"}
  else if(psa&&cost&&psa<=cost*1.3){signal="SELL";cls="red"}
  return{cost,psa,sale,target,profit,roi,upside,potentialPct,signal,cls}
}

function marketTrend(c){
  const h=Array.isArray(c.priceHistory)?c.priceHistory:[]
  if(h.length<2)return{label:"Not enough data",cls:"neutral"}
  const first=Number(h[0].price||0),last=Number(h[h.length-1].price||0)
  if(!first||!last)return{label:"Not enough data",cls:"neutral"}
  const change=((last-first)/first)*100
  if(change>=8)return{label:"Rising",cls:"green"}
  if(change<=-8)return{label:"Cooling",cls:"red"}
  return{label:"Stable",cls:"blue"}
}

function risk(c){
  const cost=Number(c.value||0),psa=Number(c.psa||0),target=Number(c.targetBuy||0)
  if(c.status==="wishlist"&&target)return{label:"TARGET "+money(target),cls:"purple"}
  if(!cost||!psa)return null
  const ratio=psa/cost
  if(ratio>=2.5)return{label:"STRONG",cls:"green"}
  if(ratio>=1.5)return{label:"UPSIDE",cls:"blue"}
  if(cost>=100&&ratio<1.5)return{label:"RISK",cls:"red"}
  if(ratio<=1.2)return{label:"LOW",cls:"red"}
  return null
}

function displaySignal(c){
  const r=risk(c),a=analyze(c)
  if(r)return r
  if(a.signal&&a.signal!==(buckets[c.bucket]||"HOLD"))return{label:a.signal,cls:a.cls}
  return null
}

function duplicateCount(name){
  const n=String(name||"").trim().toLowerCase()
  if(!n)return 0
  return cards.filter(c=>String(c.name||"").trim().toLowerCase()===n).length
}

function data(){
  const inventory=cards.filter(c=>!c.status||c.status==="active")
  const wishlist=cards.filter(c=>c.status==="wishlist")
  const sold=cards.filter(c=>c.status==="sold")
  const traded=cards.filter(c=>c.status==="traded")
  const history=[...sold,...traded]
  const grails=cards.filter(c=>c.favorite)
  const bucketCounts={H:0,G:0,T:0,S:0,W:0}
  cards.forEach(c=>{if(bucketCounts[c.bucket]!==undefined)bucketCounts[c.bucket]++})
  const unrealizedUpside=inventory.reduce((s,c)=>s+Math.max(0,Number(c.psa||0)-Number(c.value||0)),0)

  return{
    inventory,wishlist,sold,traded,history,grails,bucketCounts,
    inventoryValue:inventory.reduce((s,c)=>s+Number(c.value||0),0),
    invested:cards.filter(c=>c.status!=="wishlist").reduce((s,c)=>s+Number(c.value||0),0),
    returned:sold.reduce((s,c)=>s+Number(c.salePrice||0),0),
    profit:sold.reduce((s,c)=>s+(Number(c.salePrice||0)-Number(c.value||0)),0),
    wishlistTarget:wishlist.reduce((s,c)=>s+Number(c.targetBuy||0),0),
    unrealizedUpside
  }
}

function favoritePokemon(){
  const counts={}
  cards.forEach(c=>{const a=getAnchor(c.name);counts[a]=(counts[a]||0)+1})
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1])
  return sorted.length?sorted[0][0]:"None yet"
}

function mostValuableCard(){
  const owned=cards.filter(c=>c.status!=="wishlist")
  if(!owned.length)return null
  return[...owned].sort((a,b)=>Number(b.value||0)-Number(a.value||0))[0]
}

function sortCards(list){
  return[...list].sort((a,b)=>{
    const aa=analyze(a),bb=analyze(b)
    if(sortMode==="highest")return bb.cost-aa.cost
    if(sortMode==="alphabetical")return String(a.name).localeCompare(String(b.name))
    if(sortMode==="upside")return bb.upside-aa.upside
    if(sortMode==="loss")return aa.profit-bb.profit
    return new Date(b.createdAt||0)-new Date(a.createdAt||0)
  })
}

function visibleCards(){
  const d=data()
  let list=screen==="wishlist"?d.wishlist:screen==="analytics"?[]:screen==="profile"?[]:screen==="detail"?[]:screen==="search"?cards:screen==="vault"?d.inventory:d.history
  list=list.filter(c=>{
    if(filterStatus!=="All"&&c.status!==filterStatus)return false
    if(filterBucket!=="All"&&c.bucket!==filterBucket)return false
    if(filterAnchor!=="All"&&getAnchor(c.name)!==filterAnchor)return false
    if(filterFolder!=="All"&&shortFolder(c.folder)!==filterFolder)return false
    if(searchText&&!String(c.name).toLowerCase().includes(searchText.toLowerCase()))return false
    return true
  })
  return sortCards(list)
}

function groupByBucket(list){
  const grouped={H:[],G:[],T:[],S:[],W:[]}
  list.forEach(c=>{
    const key=c.bucket||"H"
    if(!grouped[key])grouped[key]=[]
    grouped[key].push(c)
  })
  return grouped
}

function updateCard(){

  if(!c)return
  c.name=titleCaseName(document.getElementById("editName").value.trim())
  c.value=Number(document.getElementById("editValue").value||0)

function moveCard(b){
  const c=cards.find(x=>x.id===selectedId)
  if(!c)return
  c.bucket=b
  c.status=b==="W"?"wishlist":"active"
  c.salePrice=0
  c.tradedFor=""
  c.reasonSold=""
  c.soldAt=""
  c.tradedAt=""
  sheet=null
  save()
}

function markSold(){
  const c=cards.find(x=>x.id===selectedId)
  if(!c)return
  const sale=Number(document.getElementById("saleInput").value||0)
  if(!sale)return alert("Enter sale price")
  c.status="sold"
  c.salePrice=sale
  c.reasonSold=document.getElementById("reasonInput").value
  c.soldAt=new Date().toISOString()
  sheet=null
  save()
}

function markTraded(){
  const c=cards.find(x=>x.id===selectedId)
  if(!c)return
  const t=document.getElementById("tradeInput").value.trim()
  if(!t)return alert("Enter trade details")
  c.status="traded"
  c.tradedFor=t
  c.tradedAt=new Date().toISOString()
  sheet=null
  save()
}

function restoreCard(){
  const c=cards.find(x=>x.id===selectedId)
  if(!c)return
  c.status="active"
  if(c.bucket==="W")c.bucket="H"
  c.salePrice=0
  c.tradedFor=""
  c.reasonSold=""
  sheet=null
  save()
}

function addPriceLog(){
  const c=cards.find(x=>x.id===selectedId)
  if(!c)return
  const price=Number(document.getElementById("priceLog").value||0)
  if(!price)return alert("Enter price")
  if(!Array.isArray(c.priceHistory))c.priceHistory=[]
  c.priceHistory.push({price,note:document.getElementById("priceNote").value.trim(),date:new Date().toISOString()})
  sheet=null
  save()
}

function deleteCard(){
  if(prompt("Type DELETE to confirm")!=="DELETE")return
  cards=cards.filter(c=>c.id!==selectedId)
  selectedId=null
  screen=previousScreen||"vault"
  sheet=null
  save()
}

function exportBackup(){
  const blob=new Blob([JSON.stringify(cards,null,2)],{type:"application/json"})
  const url=URL.createObjectURL(blob)
  const a=document.createElement("a")
  a.href=url
  a.download="pokevault-backup.json"
  a.click()
  URL.revokeObjectURL(url)
}

function importBackup(event){
  const file=event.target.files[0]
  if(!file)return
  const reader=new FileReader()
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result)
      if(!Array.isArray(imported)){alert("Invalid backup file");return}
      cards=imported
      save()
      alert("Backup imported successfully")
    }catch{alert("Invalid JSON file")}
  }
  reader.readAsText(file)
}

  const d=data()
  const list=visibleCards()

  const gridClass=`grid ${viewMode==="grid"?"gridMode":""} ${list.length===1&&viewMode==="grid"?"oneCard":""}`

  app.innerHTML=`
    ${topHTML()}
    ${
      screen==="detail"?detailScreen():
      screen==="profile"?profileScreen(d):
      `
      <div class="searchRow">
        <input class="search" placeholder="Search collection" value="${safe(searchText)}" oninput="searchText=this.value;render()" />
        <button class="filterBtn" onclick="filtersOpen=true;render()">☰</button>

            list.length
            ? Object.entries(grouped).map(([bucket,items])=>{

  `
}

function analytics(d){
  const sold=[...d.sold].sort((a,b)=>(b.salePrice-b.value)-(a.salePrice-a.value)),best=sold[0],worst=sold[sold.length-1],reasonStats={}
  d.sold.forEach(c=>{
    const k=c.reasonSold||"unknown"
    if(!reasonStats[k])reasonStats[k]={count:0,profit:0}
    reasonStats[k].count++
    reasonStats[k].profit+=Number(c.salePrice||0)-Number(c.value||0)
  })

  return `
    <div class="detailCard">
      <div class="name">Capital Snapshot</div>
      <div class="meta">Invested: <b>${money(d.invested)}</b></div>
      <div class="meta">Inventory Value: <b>${money(d.inventoryValue)}</b></div>
      <div class="meta">Unrealized Upside: <b class="blue">${money(d.unrealizedUpside)}</b></div>
      <div class="meta">Wishlist Target: <b class="purple">${money(d.wishlistTarget)}</b></div>
      <div class="meta">Returned: <b class="green">${money(d.returned)}</b></div>
      <div class="meta">Realized P/L: <b class="${d.profit>=0?"green":"red"}">${d.profit>=0?"+":""}${money(d.profit)}</b></div>
    </div>
    <div class="detailCard"><div class="name">Best Sale</div>${best?saleMini(best):`<div class="meta">No sold cards yet</div>`}</div>
    <div class="detailCard"><div class="name">Worst Sale</div>${worst?saleMini(worst):`<div class="meta">No sold cards yet</div>`}</div>
    <div class="detailCard"><div class="name">Why Cards Were Sold</div>${Object.entries(reasonStats).map(([k,v])=>`<div class="meta">${reasons[k]||k}: <b>${v.count}</b> · <b class="${v.profit>=0?"green":"red"}">${v.profit>=0?"+":""}${money(v.profit)}</b></div>`).join("")||`<div class="meta">No sold reasons yet</div>`}</div>
  `
}

function saleMini(c){
  const p=Number(c.salePrice||0)-Number(c.value||0)
  return `<div class="meta"><b>${safe(c.name)}</b></div><div class="meta">Sold ${money(c.salePrice)} · Cost ${money(c.value)} · <b class="${p>=0?"green":"red"}">${p>=0?"+":""}${money(p)}</b></div>`
}

function bottomNav(){
  return `<div class="bottomNav">${[["vault","▦","Vault"],["wishlist","♡","Wishlist"],["analytics","▤","Analytics"],["profile","◉","Profile"],["search","⌕","Search"]].map(([s,i,l])=>`<button class="navBtn ${screen===s?"active":""}" onclick="screen='${s}';render()"><span class="navIcon">${i}</span>${l}</button>`).join("")}</div>`
}

function sheetHTML(){
  if(!sheet)return""

  if(sheet==="backup"){
    return `<div class="sheetBack" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><h2>Backup & Restore</h2><button class="secondary" onclick="exportBackup()">Export JSON Backup</button><input type="file" accept=".json" onchange="importBackup(event)" /><button class="primary" onclick="sheet=null;render()">Close</button></div></div>`
  }

  if(sheet==="add"){
    return `
      <div class="sheetBack" onclick="sheet=null;render()">
        <div class="sheet compactSheet" onclick="event.stopPropagation()">
          <div class="sheetHandle"></div>
          <h2>Add Card</h2>
          <input id="name" placeholder="Card name" oninput="const w=document.getElementById('dupWarn');const c=duplicateCount(this.value);w.innerHTML=c?'⚠ Duplicate detected: '+c+' existing':''" />
          <div id="dupWarn" class="warning"></div>
          <div class="row"><input id="value" type="number" placeholder="Cost $" /><input id="psa" type="number" placeholder="PSA10 $" /></div>
          <select id="bucket"><option value="H">Hold</option><option value="G">Grade</option><option value="T">Trade</option><option value="S">Sell</option><option value="W">Wishlist</option></select>
          <button class="secondary" onclick="advancedAdd=!advancedAdd;render()">Advanced Details ${advancedAdd?"▴":"▾"}</button>
          <div class="advancedBox ${advancedAdd?"open":""}">
            <input id="imageUrl" placeholder="Image URL" />
            <div class="row"><input id="setName" placeholder="Set / Expansion" /><select id="language"><option value="EN">English</option><option value="JP">Japanese</option><option value="KR">Korean</option><option value="ES">Spanish</option></select></div>
            <div class="row"><select id="rarity"><option value="">Rarity</option><option>Common</option><option>Holo</option><option>Ultra Rare</option><option>Illustration Rare</option><option>SIR</option><option>Promo</option></select><select id="folder"><option>Main Collection</option><option>Business Inventory</option><option>Personal Collection</option><option>Grading Candidates</option><option>For Sale</option></select></div>
            <div class="row"><select id="type"><option>Raw</option><option>Slab</option></select><input id="targetBuy" type="number" placeholder="Target buy $" /></div>
            <div class="section">Purchase Journal</div>
            <input id="purchaseSource" placeholder="Where did you buy it?" />
            <input id="purchaseDate" type="date" />
            <textarea id="purchaseNote" placeholder="Purchase notes"></textarea>
          </div>
          <div class="stickySave"><button class="primary" onclick="addCardFromForm()">Save Card</button></div>
        </div>
      </div>
    `
  }

  const c=cards.find(x=>x.id===selectedId)
  if(!c)return""

  if(sheet==="edit"){
    return `
      <div class="sheetBack" onclick="sheet='manage';render()">
        <div class="sheet" onclick="event.stopPropagation()">
          <h2>Edit Card</h2>
          <input id="editName" value="${safe(c.name||"")}" />
          <input id="editValue" type="number" value="${c.value||0}" />
          <input id="editPSA" type="number" value="${c.psa||0}" />
          <input id="editImageUrl" value="${safe(c.imageUrl||"")}" placeholder="Image URL" />
          <input id="editTarget" type="number" value="${c.targetBuy||0}" placeholder="Target buy $" />
          <input id="editSet" value="${safe(c.setName||"")}" placeholder="Set / Expansion" />
          <select id="editLang">${["EN","JP","KR","ES"].map(x=>`<option value="${x}" ${c.language===x?"selected":""}>${x}</option>`).join("")}</select>
          <select id="editRarity">${["","Common","Holo","Ultra Rare","Illustration Rare","SIR","Promo"].map(x=>`<option value="${x}" ${c.rarity===x?"selected":""}>${x||"Rarity"}</option>`).join("")}</select>
          <select id="editFolder">${["Main Collection","Business Inventory","Personal Collection","Grading Candidates","For Sale"].map(x=>`<option ${c.folder===x?"selected":""}>${x}</option>`).join("")}</select>
          <select id="editType"><option ${c.type==="Raw"?"selected":""}>Raw</option><option ${c.type==="Slab"?"selected":""}>Slab</option></select>
          <select id="editBucket">${["H","G","T","S","W"].map(b=>`<option value="${b}" ${c.bucket===b?"selected":""}>${buckets[b]}</option>`).join("")}</select>
          <div class="section">Purchase Journal</div>
          <input id="editPurchaseSource" value="${safe(c.purchaseSource||"")}" placeholder="Where did you buy it?" />
          <input id="editPurchaseDate" type="date" value="${safe(c.purchaseDate||"")}" />
          <textarea id="editPurchaseNote" placeholder="Purchase notes">${safe(c.purchaseNote||"")}</textarea>
          <button class="primary" onclick="updateCard()">Save Changes</button>
        </div>
      </div>
    `
  }

  if(sheet==="price"){
    return `<div class="sheetBack" onclick="sheet='manage';render()"><div class="sheet" onclick="event.stopPropagation()"><h2>Price Snapshot</h2><p>${safe(c.name)}</p><input id="priceLog" type="number" placeholder="Current price $" /><input id="priceNote" placeholder="Source / note" /><button class="primary" onclick="addPriceLog()">Save Price</button></div></div>`
  }

  return `
    <div class="sheetBack" onclick="sheet=null;render()">
      <div class="sheet" onclick="event.stopPropagation()">
        <h2>${safe(c.name)}</h2>
        <p>${c.type||"Raw"} · ${getAnchor(c.name)} · ${buckets[c.bucket]}</p>
        <button class="secondary" onclick="toggleFavorite(${c.id})">${c.favorite?"Remove Grail ★":"Mark as Grail ☆"}</button>
        <div class="section">Card Actions</div>
        <button class="secondary" onclick="sheet='edit';render()">Edit Card</button>
        <button class="secondary" onclick="sheet='price';render()">Add Price Snapshot</button>
        ${(c.status==="sold"||c.status==="traded"||c.status==="wishlist")?`<button class="secondary" onclick="restoreCard()">Restore to Inventory</button>`:""}
        <div class="section">Move</div>
        ${["H","G","T","S","W"].map(b=>`<button class="secondary" onclick="moveCard('${b}')">Move to ${buckets[b]}</button>`).join("")}
        <div class="section">Sell / Trade</div>
        <input id="saleInput" type="number" placeholder="Sale price $" />
        <select id="reasonInput"><option value="">Reason Sold</option><option value="flip">Quick Flip</option><option value="cash">Need Cash</option><option value="drop">Market Drop</option><option value="overpay">Overpaid</option><option value="upgrade">Upgrade Capital</option></select>
        <button class="secondary" onclick="markSold()">Mark Sold</button>
        <input id="tradeInput" placeholder="Traded for what?" />
        <button class="secondary" onclick="markTraded()">Mark Traded</button>
        <div class="section">Danger Zone</div>
        <button class="secondary danger" onclick="deleteCard()">Delete Permanently</button>
        <button class="primary" onclick="sheet=null;render()">Close</button>
      </div>
    </div>
  `
}

render()
</script>
</body>
</html>
