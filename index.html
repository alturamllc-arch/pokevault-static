<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

  <title>PokéVault</title>

  <meta
    name="description"
    content="Your personal Pokémon card collection vault."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div id="app">

    <!-- HEADER -->
    <header class="app-header">

      <div class="header-top">

        <div class="header-brand">
          <span class="brand-icon">⚡</span>
          <h1 class="app-title">PokéVault</h1>
        </div>

        <div class="header-stats" id="header-stats"></div>

      </div>

      <div class="search-wrap">

        <span class="search-icon">

          <svg
            width="16"
            height="16"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle
              cx="11"
              cy="11"
              r="8"
              stroke="currentColor"
              stroke-width="2"
            />

            <path
              d="m21 21-4.35-4.35"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>

        </span>

        <input
          class="search-input"
          type="search"
          id="search-input"
          placeholder="Search cards…"
          autocomplete="off"
          spellcheck="false"
        />

        <button
          class="search-clear"
          id="search-clear"
          aria-label="Clear search"
          hidden
        >
          ✕
        </button>

      </div>

    </header>

    <!-- MAIN -->
    <main class="main-content" id="main-content">

      <div class="section-header">

        <h2 class="section-title" id="section-title">
          My Collection
        </h2>

        <span class="section-count" id="section-count">
          0 cards
        </span>

      </div>

      <div class="card-grid" id="card-grid"></div>

      <div
        class="empty-state"
        id="empty-state"
        hidden
      >
        <div class="empty-icon">🃏</div>

        <p class="empty-title">
          No cards here
        </p>

        <p class="empty-sub">
          Tap <strong>+</strong> to add your first card
        </p>
      </div>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" id="bottom-nav">

      <button
        class="nav-btn active"
        data-view="home"
        aria-label="Vault"
      >

        <svg
          class="nav-icon"
          width="22"
          height="22"
          fill="none"
          viewBox="0 0 24 24"
        >
          <rect
            x="3"
            y="3"
            width="8"
            height="8"
            rx="2"
            stroke="currentColor"
            stroke-width="2"
          />

          <rect
            x="13"
            y="3"
            width="8"
            height="8"
            rx="2"
            stroke="currentColor"
            stroke-width="2"
          />

          <rect
            x="3"
            y="13"
            width="8"
            height="8"
            rx="2"
            stroke="currentColor"
            stroke-width="2"
          />

          <rect
            x="13"
            y="13"
            width="8"
            height="8"
            rx="2"
            stroke="currentColor"
            stroke-width="2"
          />
        </svg>

        <span class="nav-label">Vault</span>

      </button>

      <button
        class="nav-btn"
        data-view="wishlist"
        aria-label="Wishlist"
      >

        <svg
          class="nav-icon"
          width="22"
          height="22"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linejoin="round"
          />
        </svg>

        <span class="nav-label">Wishlist</span>

      </button>

      <button
        class="nav-btn"
        data-view="sold"
        aria-label="Sold"
      >

        <svg
          class="nav-icon"
          width="22"
          height="22"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            d="M12 2 2 7l10 5 10-5-10-5z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linejoin="round"
          />

          <path
            d="M2 17l10 5 10-5"
            stroke="currentColor"
            stroke-width="2"
            stroke-linejoin="round"
          />

          <path
            d="M2 12l10 5 10-5"
            stroke="currentColor"
            stroke-width="2"
            stroke-linejoin="round"
          />
        </svg>

        <span class="nav-label">Sold</span>

      </button>

    </nav>

    <!-- FAB -->
    <button
      class="fab"
      id="fab"
      aria-label="Add card"
    >

      <svg
        width="24"
        height="24"
        fill="none"
        viewBox="0 0 24 24"
      >
        <path
          d="M12 5v14M5 12h14"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
        />
      </svg>

    </button>

  </div>

  <!-- DETAIL OVERLAY -->
  <div
    class="overlay"
    id="detail-overlay"
    hidden
  >

    <div class="detail-panel" id="detail-panel">

      <button
        class="overlay-close"
        id="detail-close"
        aria-label="Close"
      >

        <svg
          width="18"
          height="18"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            d="M18 6 6 18M6 6l12 12"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>

      </button>

      <div
        class="detail-content"
        id="detail-content"
      ></div>

    </div>

  </div>

  <!-- ADD / EDIT MODAL -->
  <div
    class="overlay"
    id="modal-overlay"
    hidden
  >

    <div class="modal" id="modal">

      <div class="modal-header">

        <h2 class="modal-title" id="modal-title">
          Add Card
        </h2>

        <button
          class="overlay-close"
          id="modal-close"
          aria-label="Close"
        >

          <svg
            width="18"
            height="18"
            fill="none"
            viewBox="0 0 24 24"
          >
            <path
              d="M18 6 6 18M6 6l12 12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>

        </button>

      </div>

      <div class="modal-body">

        <form id="card-form" novalidate>

          <input
            type="hidden"
            id="field-id"
          />

          <div class="form-group">

            <label
              class="form-label"
              for="field-name"
            >
              Card Name
              <span class="required">*</span>
            </label>

            <input
              class="form-input"
              type="text"
              id="field-name"
              placeholder="e.g. Charizard"
              autocomplete="off"
            />

          </div>

          <div class="form-row">

            <div class="form-group">

              <label
                class="form-label"
                for="field-type"
              >
                Type
              </label>

              <select
                class="form-input"
                id="field-type"
              >
                <option value="Normal">Normal</option>
                <option value="Fire">🔥 Fire</option>
                <option value="Water">💧 Water</option>
                <option value="Grass">🌿 Grass</option>
                <option value="Electric">⚡ Electric</option>
                <option value="Psychic">🔮 Psychic</option>
                <option value="Dark">🌑 Dark</option>
              </select>

            </div>

            <div class="form-group">

              <label
                class="form-label"
                for="field-value"
              >
                Value ($)
              </label>

              <input
                class="form-input"
                type="number"
                id="field-value"
                placeholder="0.00"
                min="0"
                step="0.01"
              />

            </div>

          </div>

          <div class="form-group">

            <label
              class="form-label"
              for="field-status"
            >
              Status
            </label>

            <select
              class="form-input"
              id="field-status"
            >
              <option value="owned">Owned</option>
              <option value="wishlist">Wishlist</option>
              <option value="sold">Sold</option>
            </select>

          </div>

          <div class="form-group">

            <label
              class="form-label"
              for="field-image"
            >
              Image URL
              <span class="optional">(optional)</span>
            </label>

            <input
              class="form-input"
              type="url"
              id="field-image"
              placeholder="https://…"
            />

          </div>

          <div class="form-group form-toggle">

            <label
              class="form-label"
              for="field-favorite"
            >
              Mark as Favorite
            </label>

            <label class="toggle-switch">

              <input
                type="checkbox"
                id="field-favorite"
              />

              <span class="toggle-track"></span>

            </label>

          </div>

        </form>

      </div>

      <div class="modal-footer">

        <button
          class="btn btn-danger"
          id="btn-delete"
          hidden
        >
          Delete
        </button>

        <div class="modal-footer-right">

          <button
            class="btn btn-ghost"
            id="btn-cancel"
          >
            Cancel
          </button>

          <button
            class="btn btn-primary"
            id="btn-save"
          >
            Save Card
          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- CONFIRM DELETE -->
  <div
    class="overlay"
    id="confirm-overlay"
    hidden
  >

    <div class="modal modal-sm" id="confirm-modal">

      <div class="modal-header">
        <h2 class="modal-title">
          Delete Card?
        </h2>
      </div>

      <div class="modal-body">
        <p class="confirm-text">
          This will permanently remove the card from your vault.
        </p>
      </div>

      <div class="modal-footer">

        <button
          class="btn btn-ghost"
          id="btn-confirm-cancel"
        >
          Cancel
        </button>

        <button
          class="btn btn-danger"
          id="btn-confirm-delete"
        >
          Delete
        </button>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
