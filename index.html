<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PokéVault</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;color:#111}
#app{max-width:480px;margin:auto;padding:16px}

h1{font-size:28px;font-weight:900}

.card{
  background:white;
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
}

.name{font-weight:900}
.meta{color:#777;font-size:13px}

.green{color:#15803d}
.red{color:#dc2626}
.blue{color:#2563eb}

button{padding:10px;border:none;border-radius:10px;margin-top:6px}
.manage{background:#111;color:white}

.sheet{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  padding:20px;
  border-radius:20px 20px 0 0;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
}
</style>
</head>

<body>
<div id="app"></div>

<script>

const API = "PASTE_YOUR_SCRIPT_URL_HERE"

let cards = []
let selected = null

async function load(){
  const res = await fetch(API)
  cards = await res.json()
  render()
}

function risk(c){
  const ratio = c.psa / c.value
  if(ratio >= 2) return ["GRADE","blue"]
  if(ratio <= 1.2) return ["LOW UPSIDE","red"]
  return ["HOLD","green"]
}

function render(){

  const app = document.getElementById("app")

  app.innerHTML = `
    <h1>PokéVault</h1>

    <button onclick="add()">Add Test Card</button>

    ${cards.map(c=>{
      const r = risk(c)

      return `
        <div class="card">
          <div class="name">${c.name}</div>
          <div class="meta">${c.type} · ${c.bucket}</div>

          <div>${c.value}$</div>
          <div class="${r[1]}">${r[0]}</div>

          ${c.status === "sold" ? `
            <div class="red">Sold: ${c.salePrice}$</div>
            <div>Reason: ${c.reasonSold}</div>
          ` : ""}

          <button class="manage" onclick="open('${c.id}')">Manage</button>
        </div>
      `
    }).join("")}

    ${selected ? sheet() : ""}
  `
}

function open(id){
  selected = cards.find(c=>c.id==id)
  render()
}

function close(){
  selected = null
  render()
}

async function update(updates){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"update",
      id:selected.id,
      updates
    })
  })
  await load()
  close()
}

function sheet(){
  return `
  <div class="overlay" onclick="close()">
    <div class="sheet" onclick="event.stopPropagation()">

      <h3>${selected.name}</h3>

      <button onclick="update({bucket:'H'})">HOLD</button>
      <button onclick="update({bucket:'G'})">GRADE</button>
      <button onclick="update({bucket:'T'})">TRADE</button>
      <button onclick="update({bucket:'S'})">SELL</button>

      <hr>

      <input id="sale" placeholder="Sale price" />

      <select id="reason">
        <option value="">Reason</option>
        <option value="flip">Flip</option>
        <option value="drop">Market Drop</option>
      </select>

      <button onclick="sell()">Mark SOLD</button>

      <hr>

      <button onclick="remove()">Delete</button>

    </div>
  </div>
  `
}

async function sell(){
  const price = document.getElementById("sale").value
  const reason = document.getElementById("reason").value

  await update({
    status:"sold",
    salePrice:price,
    reasonSold:reason,
    soldAt:new Date().toISOString()
  })
}

async function remove(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"delete",
      id:selected.id
    })
  })
  await load()
  close()
}

async function add(){
  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      card:{
        id:Date.now(),
        name:"Test Card",
        value:100,
        psa:200,
        type:"Raw",
        bucket:"H",
        status:"active",
        createdAt:new Date().toISOString()
      }
    })
  })
  await load()
}

load()

</script>
</body>
</html>
