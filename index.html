<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>PokéVault v1</title>

<style>
*{box-sizing:border-box}
:root{
  --bg:#f4f4f6;
  --card:#fff;
  --text:#111;
  --muted:#777;
  --dark:#111;
  --blue:#108cf5;
  --gold:#f6c343;
  --char:#ef6b2f;
  --umbreon:#1d1b2f;
  --mew:#d97cff;
}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,sans-serif}
#app{max-width:480px;margin:auto;min-height:100vh;padding:16px 14px 96px}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
h1{margin:0;font-size:32px;font-weight:900;letter-spacing:-.7px}
.roundBtn{width:48px;height:48px;border-radius:17px;border:none;background:white;font-size:22px;box-shadow:0 8px 22px rgba(0,0,0,.08)}
.searchRow{display:flex;gap:10px;margin-bottom:10px}
.search{flex:1;border:none;background:white;border-radius:18px;padding:15px;font-size:17px;box-shadow:0 7px 20px rgba(0,0,0,.05)}
.filterBtn{width:52px;border:none;background:#111;color:white;border-radius:18px;font-size:20px;font-weight:900}
.filterSummary{background:white;border-radius:16px;padding:9px 13px;margin-bottom:10px;font-size:11px;font-weight:900;color:#777;box-shadow:0 5px 16px rgba(0,0,0,.045)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0 12px}
.stat{background:white;border-radius:16px;padding:10px 6px;box-shadow:0 5px 16px rgba(0,0,0,.05);text-align:center}
.stat strong{display:block;font-size:15px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat span{font-size:9.5px;color:#777;text-transform:uppercase;font-weight:900}
.grid{display:grid;grid-template-columns:1fr;gap:10px}
.gridMode{grid-template-columns:1fr 1fr}
.bucketHeader{display:flex;align-items:center;justify-content:space-between;margin:14px 2px 7px}
.bucketTitle{font-size:15px;font-weight:900}
.bucketCount{font-size:11px;font-weight:900;color:#777;background:white;border-radius:999px;padding:4px 9px}
.card,.detailCard,.profileCard{background:white;border-radius:22px;padding:12px;box-shadow:0 10px 24px rgba(0,0,0,.075);animation:fadeUp .22s ease;transition:transform .16s ease,box-shadow .16s ease}
.card:active{transform:scale(.985)}
.cardTop{display:flex;justify-content:space-between;gap:10px}
.gridMode .card{padding:9px;border-radius:18px}
.gridMode .cardTop{display:block}
.cardImage{display:flex;align-items:center;justify-content:center;height:80px;border-radius:16px;background:linear-gradient(135deg,#ececf1,#fafafa);color:#aaa;font-size:32px;font-weight:900;margin-bottom:10px;box-shadow:inset 0 1px 0 rgba(255,255,255,.8)}
.gridMode .cardImage{height:120px}
.name{font-size:17px;font-weight:900;line-height:1.15}
.gridMode .name{font-size:14px;min-height:32px}
.meta{font-size:12px;color:#777;margin-top:5px;line-height:1.3}
.gridMode .meta{font-size:11px}
.badge,.signal{display:inline-block;margin-top:8px;margin-right:5px;border-radius:999px;padding:5px 10px;font-size:10.5px;font-weight:900}
.signal{background:#eee}
.H{background:#6f936a!important;color:white}.G{background:#6687c2!important;color:white}.T{background:#e28a55!important;color:white}.S{background:#c76565!important;color:white}.W{background:#8b5cf6!important;color:white}
.green{color:#15803d!important}.red{color:#dc2626!important}.blue{color:#2563eb!important}.purple{color:#7c3aed!important}.gold{color:#b7791f!important}.neutral{color:#111!important}
.accent-pikachu{box-shadow:0 10px 28px rgba(246,195,67,.24)}
.accent-charizard{box-shadow:0 10px 28px rgba(239,107,47,.22)}
.accent-umbreon{box-shadow:0 10px 28px rgba(29,27,47,.22)}
.accent-mew{box-shadow:0 10px 28px rgba(217,124,255,.22)}
.accent-pikachu .cardImage{background:linear-gradient(135deg,#fff5bf,#fff)}
.accent-charizard .cardImage{background:linear-gradient(135deg,#ffe0cc,#fff)}
.accent-umbreon .cardImage{background:linear-gradient(135deg,#1d1b2f,#4d4769);color:#e5c76b}
.accent-mew .cardImage{background:linear-gradient(135deg,#f7d2ff,#fff)}
.grailCard{box-shadow:0 12px 34px rgba(246,195,67,.35)!important}
.value{text-align:right;font-size:17px;font-weight:900}
.gridMode .value{text-align:left;font-size:15px;margin-top:8px}
.small{font-size:11px;color:#777;text-align:right}
.gridMode .small{text-align:left}
.empty{background:white;border-radius:24px;text-align:center;color:#777;padding:32px 20px;margin-top:12px;box-shadow:0 8px 22px rgba(0,0,0,.06)}
.emptyIcon{font-size:40px;margin-bottom:8px}
.emptyTitle{font-size:20px;font-weight:900;color:#111;margin-bottom:6px}
.emptyText{font-size:14px;line-height:1.4}
.fab{position:fixed;right:max(20px,calc(50vw - 220px));bottom:98px;width:60px;height:60px;border:none;border-radius:23px;background:#111;color:white;font-size:34px;font-weight:300;box-shadow:0 14px 32px rgba(0,0,0,.28);z-index:30;animation:floaty 2.4s ease-in-out infinite}
.bottomNav{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);width:calc(100% - 32px);max-width:450px;background:white;border-radius:28px;display:grid;grid-template-columns:repeat(5,1fr);padding:8px;box-shadow:0 12px 34px rgba(0,0,0,.18);z-index:25}
.navBtn{border:none;background:transparent;border-radius:22px;padding:10px 4px;font-size:12px;font-weight:900;color:#333}
.navBtn.active{background:#e9e9ee;color:#111}
.navIcon{display:block;font-size:22px;margin-bottom:3px}
.sheetBack{position:fixed;inset:0;background:rgba(0,0,0,.74);display:flex;align-items:flex-end;z-index:99;backdrop-filter:blur(9px);animation:fadeIn .18s ease}
.sheet{width:100%;max-width:480px;margin:auto;background:white;border-radius:30px 30px 0 0;padding:22px;max-height:92vh;overflow-y:auto;box-shadow:0 -12px 44px rgba(0,0,0,.28);animation:slideUp .24s cubic-bezier(.22,1,.36,1)}
.compactSheet{max-height:68vh!important;padding-bottom:86px!important}
.sheetHandle{width:60px;height:6px;background:#ddd;border-radius:999px;margin:0 auto 18px}
.sheet h2{margin:0 0 14px;font-size:26px}
input,select,textarea{width:100%;border:none;background:#f0f0f0;border-radius:15px;padding:15px;font-size:16px;margin-bottom:10px}
textarea{min-height:78px;resize:none}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.primary{width:100%;border:none;background:#111;color:white;border-radius:16px;padding:16px;font-size:17px;font-weight:900;margin-top:6px}
.stickySave{position:sticky;bottom:0;background:white;padding-top:12px}
.secondary{width:100%;border:none;background:#f0f0f0;color:#111;border-radius:16px;padding:15px;font-size:15px;font-weight:900;margin-bottom:10px;text-align:left}
.danger{background:#fee2e2!important;color:#991b1b!important}
.warning{background:#fff7ed;color:#9a3412;border-radius:12px;padding:10px 12px;font-size:13px;font-weight:800;margin-bottom:10px}
.section{font-size:12px;color:#777;font-weight:900;text-transform:uppercase;margin:16px 0 8px}
.advancedBox{display:none;background:#fafafa;border-radius:18px;padding:12px;margin:8px 0 12px}
.advancedBox.open{display:block}
.chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:10px;padding-bottom:3px}
.chip{border:1px solid #ddd;background:#f7f7f8;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:900;white-space:nowrap}
.chip.active{background:#108cf5;color:white;border-color:#108cf5}
.filterHead{position:sticky;top:-22px;background:white;padding-top:6px;z-index:4;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.filterTitle{font-size:18px;font-weight:900}
.closeMini{border:none;background:#eee;border-radius:999px;width:34px;height:34px;font-size:18px;font-weight:900}
.detailHero{border-radius:28px;padding:22px;margin-bottom:12px;background:linear-gradient(180deg,#fff,#f8f8fa);box-shadow:0 12px 34px rgba(0,0,0,.1)}
.detailTitle{font-size:30px;font-weight:900;line-height:1.05;margin-bottom:8px}
.detailValue{font-size:34px;font-weight:900;margin-top:14px}
.detailGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.detailMini{background:white;border-radius:18px;padding:14px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
.detailMini strong{display:block;font-size:18px}
.detailMini span{font-size:12px;color:#777;font-weight:800;text-transform:uppercase}
.profileHeader{text-align:center;background:linear-gradient(180deg,#fff,#f7f7fa);border-radius:28px;padding:24px 16px;margin-bottom:12px;box-shadow:0 10px 28px rgba(0,0,0,.08)}
.profileIcon{font-size:42px;margin-bottom:8px}
.profileTitle{font-size:28px;font-weight:900}
.profileSub{font-size:14px;color:#777;margin-top:5px}
.progressWrap{background:white;border-radius:22px;padding:14px;margin:12px 0;box-shadow:0 8px 22px rgba(0,0,0,.06)}
.progressTitle{font-size:16px;font-weight:900;margin-bottom:10px}
.progressRow{display:flex;align-items:center;gap:8px;margin:8px 0}
.progressLbl{width:58px;font-size:11px;font-weight:900;color:#777}
.progressBar{flex:1;height:10px;background:#eee;border-radius:999px;overflow:hidden}
.progressFill{height:100%;border-radius:999px}
.progressNum{width:28px;text-align:right;font-size:11px;font-weight:900;color:#777}
.grailStar{color:#f59e0b!important;text-shadow:0 0 10px rgba(246,195,67,.5)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(24px);opacity:.72}to{transform:translateY(0);opacity:1}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
</style>
</head>

<body>
<div id="app"></div>

<script>
const KEY="pokevault_v1_phase8"
let cards=JSON.parse(localStorage.getItem(KEY)||"[]")
let screen="vault",previousScreen="vault",filterStatus="All",filterBucket="All",filterAnchor="All",filterFolder="All",searchText="",sortMode="newest",viewMode="list",filtersOpen=false,sheet=null,selectedId=null,advancedAdd=false

const buckets={H:"HOLD",G:"GRADE",T:"TRADE",S:"SELL",W:"WISHLIST"}
const reasons={flip:"Quick Flip",cash:"Need Cash",drop:"Market Drop",overpay:"Overpaid",upgrade:"Upgrade Capital"}

function save(){localStorage.setItem(KEY,JSON.stringify(cards));render()}
function money(n){return "$"+Number(n||0).toLocaleString()}
function safe(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;")}

function getAnchor(name){
  const n=String(name||"").toLowerCase()
  if(n.includes("pikachu")||n.includes("pichu"))return"Pikachu"
  if(n.includes("charizard")||n.includes("charmeleon"))return"Charizard"
  if(n.includes("umbreon"))return"Umbreon"
  if(n.includes("mew"))return"Mew"
  return"Other"
}

function accentClass(c){
  const a=getAnchor(c.name)
  if(a==="Pikachu")return"accent-pikachu"
  if(a==="Charizard")return"accent-charizard"
  if(a==="Umbreon")return"accent-umbreon"
  if(a==="Mew")return"accent-mew"
  return""
}

function shortFolder(folder){
  if(!folder)return"All"
  if(folder.includes("Personal"))return"Personal"
  if(folder.includes("Business"))return"Business"
  if(folder.includes("Grading"))return"Grading"
  if(folder.includes("For Sale"))return"For Sale"
  return folder
}

function analyze(c){
  const cost=Number(c.value||0),psa=Number(c.psa||0),sale=Number(c.salePrice||0),target=Number(c.targetBuy||0)
  const profit=sale-cost,roi=cost?Math.round((profit/cost)*100):0,upside=psa-cost,potentialPct=cost&&psa?Math.round((upside/cost)*100):0
  let signal="HOLD",cls="green"
  if(c.status==="wishlist"){signal=target?"WATCH":"WISHLIST";cls="purple"}
  else if(c.status==="sold"){signal=profit>0?"PROFIT":profit<0?"LOSS":"EVEN";cls=profit>0?"green":profit<0?"red":"neutral"}
  else if(c.status==="traded"){signal="TRADED";cls="blue"}
  else if(psa&&cost&&psa>=cost*2){signal="GRADE";cls="blue"}
  else if(psa&&cost&&psa<=cost*1.3){signal="SELL";cls="red"}
  return{cost,psa,sale,target,profit,roi,upside,potentialPct,signal,cls}
}

function marketTrend(c){
  const h=Array.isArray(c.priceHistory)?c.priceHistory:[]
  if(h.length<2)return{label:"Not enough data",cls:"neutral"}
  const first=Number(h[0].price||0),last=Number(h[h.length-1].price||0)
  if(!first||!last)return{label:"Not enough data",cls:"neutral"}
  const change=((last-first)/first)*100
  if(change>=8)return{label:"Rising",cls:"green"}
  if(change<=-8)return{label:"Cooling",cls:"red"}
  return{label:"Stable",cls:"blue"}
}

function risk(c){
  const cost=Number(c.value||0),psa=Number(c.psa||0),target=Number(c.targetBuy||0)
  if(c.status==="wishlist"&&target)return{label:"TARGET "+money(target),cls:"purple"}
  if(!cost||!psa)return null
  const ratio=psa/cost
  if(ratio>=2.5)return{label:"STRONG GRADE",cls:"green"}
  if(ratio>=1.5)return{label:"GOOD UPSIDE",cls:"blue"}
  if(cost>=100&&ratio<1.5)return{label:"HIGH RISK BUY",cls:"red"}
  if(ratio<=1.2)return{label:"LOW UPSIDE",cls:"red"}
  return{label:"HOLD / MONITOR",cls:"neutral"}
}

function duplicateCount(name){
  const n=String(name||"").trim().toLowerCase()
  if(!n)return 0
  return cards.filter(c=>String(c.name||"").trim().toLowerCase()===n).length
}

function data(){
  const inventory=cards.filter(c=>!c.status||c.status==="active")
  const wishlist=cards.filter(c=>c.status==="wishlist")
  const sold=cards.filter(c=>c.status==="sold")
  const traded=cards.filter(c=>c.status==="traded")
  const history=[...sold,...traded]
  const grails=cards.filter(c=>c.favorite)
  const bucketCounts={H:0,G:0,T:0,S:0,W:0}
  cards.forEach(c=>{if(bucketCounts[c.bucket]!==undefined)bucketCounts[c.bucket]++})
  const unrealizedUpside=inventory.reduce((s,c)=>s+Math.max(0,Number(c.psa||0)-Number(c.value||0)),0)
  return{inventory,wishlist,sold,traded,history,grails,bucketCounts,inventoryValue:inventory.reduce((s,c)=>s+Number(c.value||0),0),invested:cards.filter(c=>c.status!=="wishlist").reduce((s,c)=>s+Number(c.value||0),0),returned:sold.reduce((s,c)=>s+Number(c.salePrice||0),0),profit:sold.reduce((s,c)=>s+(Number(c.salePrice||0)-Number(c.value||0)),0),wishlistTarget:wishlist.reduce((s,c)=>s+Number(c.targetBuy||0),0),unrealizedUpside}
}

function favoritePokemon(){
  const counts={}
  cards.forEach(c=>{const a=getAnchor(c.name);counts[a]=(counts[a]||0)+1})
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1])
  return sorted.length?sorted[0][0]:"None yet"
}

function mostValuableCard(){
  const owned=cards.filter(c=>c.status!=="wishlist")
  if(!owned.length)return null
  return[...owned].sort((a,b)=>Number(b.value||0)-Number(a.value||0))[0]
}

function sortCards(list){
  return[...list].sort((a,b)=>{
    const aa=analyze(a),bb=analyze(b)
    if(sortMode==="highest")return bb.cost-aa.cost
    if(sortMode==="alphabetical")return String(a.name).localeCompare(String(b.name))
    if(sortMode==="upside")return bb.upside-aa.upside
    if(sortMode==="loss")return aa.profit-bb.profit
    return new Date(b.createdAt||0)-new Date(a.createdAt||0)
  })
}

function visibleCards(){
  const d=data()
  let list=screen==="wishlist"?d.wishlist:screen==="analytics"?[]:screen==="profile"?[]:screen==="detail"?[]:screen==="search"?cards:screen==="vault"?d.inventory:d.history
  list=list.filter(c=>{
    if(filterStatus!=="All"&&c.status!==filterStatus)return false
    if(filterBucket!=="All"&&c.bucket!==filterBucket)return false
    if(filterAnchor!=="All"&&getAnchor(c.name)!==filterAnchor)return false
    if(filterFolder!=="All"&&shortFolder(c.folder)!==filterFolder)return false
    if(searchText&&!String(c.name).toLowerCase().includes(searchText.toLowerCase()))return false
    return true
  })
  return sortCards(list)
}

function groupByBucket(list){
  const grouped={H:[],G:[],T:[],S:[],W:[]}
  list.forEach(c=>{const key=c.bucket||"H";if(!grouped[key])grouped[key]=[];grouped[key].push(c)})
  return grouped
}

function openDetail(id){selectedId=id;previousScreen=screen==="detail"?"vault":screen;screen="detail";sheet=null;render()}
function goBack(){screen=previousScreen||"vault";selectedId=null;render()}
function toggleFavorite(id){const c=cards.find(x=>x.id===id);if(!c)return;c.favorite=!c.favorite;save()}
function quickMove(id,b){const c=cards.find(x=>x.id===id);if(!c)return;c.bucket=b;c.status=b==="W"?"wishlist":"active";save()}

function addCardFromForm(){
  const name=document.getElementById("name").value.trim()
  if(!name)return alert("Enter card name")
  const bucket=document.getElementById("bucket").value
  cards.push({
    id:Date.now(),name,
    value:Number(document.getElementById("value").value||0),
    psa:Number(document.getElementById("psa").value||0),
    setName:document.getElementById("setName")?.value.trim()||"",
    language:document.getElementById("language")?.value||"EN",
    rarity:document.getElementById("rarity")?.value||"",
    folder:document.getElementById("folder")?.value||"Main Collection",
    type:document.getElementById("type")?.value||"Raw",
    purchaseSource:document.getElementById("purchaseSource")?.value.trim()||"",
    purchaseDate:document.getElementById("purchaseDate")?.value||"",
    purchaseNote:document.getElementById("purchaseNote")?.value.trim()||"",
    bucket,targetBuy:Number(document.getElementById("targetBuy")?.value||0),
    status:bucket==="W"?"wishlist":"active",favorite:false,salePrice:0,tradedFor:"",reasonSold:"",priceHistory:[],createdAt:new Date().toISOString(),soldAt:"",tradedAt:""
  })
  advancedAdd=false
  sheet=null
  save()
}

function updateCard(){
  const c=cards.find(x=>x.id===selectedId);if(!c)return
  c.name=document.getElementById("editName").value.trim()
  c.value=Number(document.getElementById("editValue").value||0)
  c.psa=Number(document.getElementById("editPSA").value||0)
  c.setName=document.getElementById("editSet").value.trim()
  c.language=document.getElementById("editLang").value
  c.rarity=document.getElementById("editRarity").value
  c.folder=document.getElementById("editFolder").value
  c.type=document.getElementById("editType").value
  c.purchaseSource=document.getElementById("editPurchaseSource").value.trim()
  c.purchaseDate=document.getElementById("editPurchaseDate").value
  c.purchaseNote=document.getElementById("editPurchaseNote").value.trim()
  c.bucket=document.getElementById("editBucket").value
  c.targetBuy=Number(document.getElementById("editTarget").value||0)
  c.status=c.bucket==="W"?"wishlist":c.status==="wishlist"?"active":c.status
  sheet=null;save()
}

function moveCard(b){
  const c=cards.find(x=>x.id===selectedId);if(!c)return
  c.bucket=b;c.status=b==="W"?"wishlist":"active";c.salePrice=0;c.tradedFor="";c.reasonSold="";c.soldAt="";c.tradedAt=""
  sheet=null;save()
}

function markSold(){
  const c=cards.find(x=>x.id===selectedId);if(!c)return
  const sale=Number(document.getElementById("saleInput").value||0)
  if(!sale)return alert("Enter sale price")
  c.status="sold";c.salePrice=sale;c.reasonSold=document.getElementById("reasonInput").value;c.soldAt=new Date().toISOString()
  sheet=null;save()
}

function markTraded(){
  const c=cards.find(x=>x.id===selectedId);if(!c)return
  const t=document.getElementById("tradeInput").value.trim()
  if(!t)return alert("Enter trade details")
  c.status="traded";c.tradedFor=t;c.tradedAt=new Date().toISOString()
  sheet=null;save()
}

function restoreCard(){
  const c=cards.find(x=>x.id===selectedId);if(!c)return
  c.status="active";if(c.bucket==="W")c.bucket="H";c.salePrice=0;c.tradedFor="";c.reasonSold=""
  sheet=null;save()
}

function addPriceLog(){
  const c=cards.find(x=>x.id===selectedId);if(!c)return
  const price=Number(document.getElementById("priceLog").value||0)
  if(!price)return alert("Enter price")
  if(!Array.isArray(c.priceHistory))c.priceHistory=[]
  c.priceHistory.push({price,note:document.getElementById("priceNote").value.trim(),date:new Date().toISOString()})
  sheet=null;save()
}

function deleteCard(){
  if(prompt("Type DELETE to confirm")!=="DELETE")return
  cards=cards.filter(c=>c.id!==selectedId);selectedId=null;screen=previousScreen||"vault";sheet=null;save()
}

function exportBackup(){
  const blob=new Blob([JSON.stringify(cards,null,2)],{type:"application/json"})
  const url=URL.createObjectURL(blob)
  const a=document.createElement("a")
  a.href=url;a.download="pokevault-backup.json";a.click()
  URL.revokeObjectURL(url)
}

function importBackup(event){
  const file=event.target.files[0];if(!file)return
  const reader=new FileReader()
  reader.onload=function(e){
    try{
      const imported=JSON.parse(e.target.result)
      if(!Array.isArray(imported)){alert("Invalid backup file");return}
      cards=imported;save();alert("Backup imported successfully")
    }catch{alert("Invalid JSON file")}
  }
  reader.readAsText(file)
}

function render(){
  const app=document.getElementById("app"),d=data(),list=visibleCards(),grouped=groupByBucket(list)
  app.innerHTML=`
    ${topHTML()}
    ${
      screen==="detail"?detailScreen():
      screen==="profile"?profileScreen(d):
      `
      <div class="searchRow">
        <input class="search" placeholder="Search by name" value="${safe(searchText)}" oninput="searchText=this.value;render()" />
        <button class="filterBtn" onclick="filtersOpen=true;render()">☰</button>
      </div>
      <div class="filterSummary">View: ${viewMode.toUpperCase()} · Sort: ${sortMode.toUpperCase()} · Folder: ${filterFolder}</div>
      ${
        screen==="analytics"?analytics(d):
        `
        ${screen==="vault"?stats(d):""}
        <div class="grid ${viewMode==="grid"?"gridMode":""}">
          ${
            list.length
            ? Object.entries(grouped).map(([bucket,items])=>{
              if(!items.length)return""
              return `${viewMode==="list"?`<div class="bucketHeader"><div class="bucketTitle">${buckets[bucket]||bucket}</div><div class="bucketCount">${items.length}</div></div>`:""}${items.map(cardHTML).join("")}`
            }).join("")
            : emptyState()
          }
        </div>`
      }`
    }
    ${filtersOpen?filterOverlay():""}
    ${screen!=="detail"&&screen!=="profile"?`<button class="fab" onclick="advancedAdd=false;sheet='add';render()">+</button>`:""}
    ${bottomNav()}
    ${sheetHTML()}
  `
}

function topHTML(){
  if(screen==="detail"){
    const c=cards.find(x=>x.id===selectedId)
    return `<div class="top"><button class="roundBtn" onclick="goBack()">‹</button><h1>Card</h1><button class="roundBtn ${c?.favorite?"grailStar":""}" onclick="toggleFavorite(${selectedId})">${c?.favorite?"★":"☆"}</button></div>`
  }
  if(screen==="profile")return `<div class="top"><button class="roundBtn" onclick="screen='vault';render()">‹</button><h1>Profile</h1><button class="roundBtn" onclick="sheet='backup';render()">☁</button></div>`
  return `<div class="top"><button class="roundBtn" onclick="screen='profile';render()">☁</button><h1>PokéVault</h1><button class="roundBtn" onclick="screen='wishlist';render()">♡</button></div>`
}

function filterOverlay(){
  return `
    <div class="sheetBack" onclick="filtersOpen=false;render()">
      <div class="sheet compactSheet" onclick="event.stopPropagation()">
        <div class="sheetHandle"></div>
        <div class="filterHead"><div class="filterTitle">Filters</div><button class="closeMini" onclick="filtersOpen=false;render()">×</button></div>
        <div class="section">View</div><div class="chips">${["list","grid"].map(v=>`<button class="chip ${viewMode===v?"active":""}" onclick="viewMode='${v}';render()">${v==="list"?"List":"Grid"}</button>`).join("")}</div>
        <div class="section">Sort</div><div class="chips">${["newest","highest","upside","loss","alphabetical"].map(s=>`<button class="chip ${sortMode===s?"active":""}" onclick="sortMode='${s}';render()">${s==="newest"?"Newest":s==="highest"?"Highest":s==="upside"?"Upside":s==="loss"?"Loss":"A-Z"}</button>`).join("")}</div>
        <div class="section">Status</div><div class="chips">${["All","active","wishlist","sold","traded"].map(s=>`<button class="chip ${filterStatus===s?"active":""}" onclick="filterStatus='${s}';render()">${s==="active"?"Owned":s[0].toUpperCase()+s.slice(1)}</button>`).join("")}</div>
        <div class="section">Bucket</div><div class="chips">${["H","G","T","S","W"].map(b=>`<button class="chip bucket ${b}" onclick="filterBucket=filterBucket==='${b}'?'All':'${b}';render()">${buckets[b]}</button>`).join("")}</div>
        <div class="section">Folder</div><div class="chips">${["All","Personal","Business","Grading","For Sale"].map(f=>`<button class="chip ${filterFolder===f?"active":""}" onclick="filterFolder='${f}';render()">${f}</button>`).join("")}</div>
        <div class="section">Anchor</div><div class="chips">${["All","Pikachu","Charizard","Umbreon","Mew","Other"].map(a=>`<button class="chip ${filterAnchor===a?"active":""}" onclick="filterAnchor='${a}';render()">${a}</button>`).join("")}</div>
      </div>
    </div>`
}

function emptyState(){
  const label=screen==="wishlist"?"No wishlist cards yet":screen==="history"?"No history yet":screen==="search"?"No matching cards":"No cards in your vault"
  const text=screen==="wishlist"?"Add target cards you want to buy later.":screen==="history"?"Sold and traded cards will appear here.":screen==="search"?"Try another search or open filters.":"Tap the + button to add your first card."
  return `<div class="empty"><div class="emptyIcon">◌</div><div class="emptyTitle">${label}</div><div class="emptyText">${text}</div></div>`
}

function stats(d){
  return `<div class="stats"><div class="stat"><strong>${money(d.inventoryValue)}</strong><span>Inventory</span></div><div class="stat"><strong>${d.inventory.length}</strong><span>Owned</span></div><div class="stat"><strong class="green">${money(d.returned)}</strong><span>Returned</span></div><div class="stat"><strong class="${d.profit>=0?"green":"red"}">${d.profit>=0?"+":""}${money(d.profit)}</strong><span>Realized</span></div></div>`
}

function cardHTML(c){
  const a=analyze(c),r=risk(c)
  return `
    <div class="card ${accentClass(c)} ${c.favorite?"grailCard":""}" onclick="openDetail(${c.id})">
      <div class="cardImage">${c.favorite?"★":"▧"}</div>
      <div class="cardTop">
        <div>
          <div class="name">${c.favorite?"★ ":""}${safe(c.name)}</div>
          <div class="meta">${c.type||"Raw"} · ${getAnchor(c.name)}</div>
          <span class="badge ${c.bucket}">${buckets[c.bucket]||"HOLD"}</span>
          ${r?`<span class="signal ${r.cls}">${r.label}</span>`:`<span class="signal ${a.cls}">${a.signal}</span>`}
        </div>
        <div><div class="value">${c.status==="wishlist"?money(c.targetBuy):money(c.value)}</div><div class="small">${c.status==="wishlist"?"Target":"Cost"}</div></div>
      </div>
    </div>`
}

function progressBlock(d){
  const total=cards.length||1
  return `<div class="progressWrap"><div class="progressTitle">Collection Progress</div>${["H","G","T","S","W"].map(b=>{const count=d.bucketCounts[b]||0,pct=Math.round((count/total)*100);return `<div class="progressRow"><div class="progressLbl">${buckets[b]}</div><div class="progressBar"><div class="progressFill ${b}" style="width:${pct}%"></div></div><div class="progressNum">${count}</div></div>`}).join("")}</div>`
}

function detailScreen(){
  const c=cards.find(x=>x.id===selectedId);if(!c)return emptyState()
  const a=analyze(c),r=risk(c),t=marketTrend(c),priceHistory=Array.isArray(c.priceHistory)?c.priceHistory:[],isSold=c.status==="sold"
  return `
    <div class="detailHero ${accentClass(c)}">
      <div class="detailTitle">${c.favorite?"★ ":""}${safe(c.name)}</div>
      <div class="meta">${c.type||"Raw"} · ${getAnchor(c.name)}${c.setName?" · "+safe(c.setName):""}${c.language?" · "+c.language:""}${c.rarity?" · "+c.rarity:""}</div>
      <span class="badge ${c.bucket}">${buckets[c.bucket]||"HOLD"}</span><span class="signal ${a.cls}">${a.signal}</span>${r?`<span class="signal ${r.cls}">${r.label}</span>`:""}<span class="signal ${t.cls}">${t.label}</span>
      <div class="detailValue">${c.status==="wishlist"?money(c.targetBuy):money(c.value)}</div>
      <div class="meta">${c.status==="wishlist"?"Target Buy Price":"Current Cost Basis"}</div>
      <button class="primary" onclick="sheet='manage';render()">Manage Card</button>
    </div>
    <div class="detailGrid">
      <div class="detailMini"><strong>${money(c.value)}</strong><span>Cost</span></div>
      <div class="detailMini"><strong>${money(c.psa)}</strong><span>PSA10 Est</span></div>
      <div class="detailMini"><strong class="${isSold?(a.profit>=0?"green":"red"):(a.upside>=0?"green":"red")}">${isSold?(a.profit>=0?"+":""):(a.upside>=0?"+":"")}${money(isSold?a.profit:a.upside)}</strong><span>${isSold?"Profit":"Upside"}</span></div>
      <div class="detailMini"><strong class="${isSold?(a.roi>=0?"green":"red"):(a.potentialPct>=0?"green":"red")}">${isSold?a.roi:a.potentialPct}%</strong><span>${isSold?"ROI":"Potential"}</span></div>
    </div>
    <div class="detailCard" style="margin-top:12px"><div class="name">Ownership</div><div class="meta">Folder: <b>${safe(c.folder||"Not set")}</b></div><div class="meta">Bought from: <b>${safe(c.purchaseSource||"Not logged")}</b></div><div class="meta">Purchase date: <b>${safe(c.purchaseDate||"Not logged")}</b></div><div class="meta">Notes: <b>${safe(c.purchaseNote||"None")}</b></div></div>
    <div class="detailCard" style="margin-top:12px"><div class="name">Market Trend</div><div class="meta">Manual snapshot trend: <b class="${t.cls}">${t.label}</b></div><div class="meta">Based only on your saved price snapshots.</div></div>
    <div class="detailCard" style="margin-top:12px"><div class="name">Price History</div>${priceHistory.length?priceHistory.map(p=>`<div class="meta"><b>${money(p.price)}</b>${p.note?" · "+safe(p.note):""}${p.date?" · "+new Date(p.date).toLocaleDateString():""}</div>`).join(""):`<div class="meta">No price snapshots yet.</div>`}</div>
    ${c.status==="sold"?`<div class="detailCard" style="margin-top:12px"><div class="name">Sale Result</div><div class="meta">Sale Price: <b>${money(c.salePrice)}</b></div><div class="meta">Result: <b class="${a.cls}">${a.profit>=0?"+":""}${money(a.profit)} (${a.roi}%)</b></div><div class="meta">Reason: <b>${reasons[c.reasonSold]||c.reasonSold||"Not logged"}</b></div></div>`:""}`
}

function profileScreen(d){
  const topCard=mostValuableCard()
  return `<div class="profileHeader"><div class="profileIcon">☁</div><div class="profileTitle">Collector Profile</div><div class="profileSub">PokéVault v1 collection identity</div></div><div class="stats"><div class="stat"><strong>${cards.length}</strong><span>Total</span></div><div class="stat"><strong>${d.grails.length}</strong><span>Grails</span></div><div class="stat"><strong>${money(d.inventoryValue)}</strong><span>Vault</span></div><div class="stat"><strong>${d.wishlist.length}</strong><span>Wishlist</span></div></div>${progressBlock(d)}<div class="profileCard"><div class="name">Collector Identity</div><div class="meta">Favorite Pokémon: <b>${favoritePokemon()}</b></div><div class="meta">Top Card: <b>${topCard?safe(topCard.name)+" · "+money(topCard.value):"None yet"}</b></div><div class="meta">Capital Returned: <b class="green">${money(d.returned)}</b></div><div class="meta">Realized P/L: <b class="${d.profit>=0?"green":"red"}">${d.profit>=0?"+":""}${money(d.profit)}</b></div><div class="meta">Unrealized Upside: <b class="blue">${money(d.unrealizedUpside)}</b></div></div><div class="profileCard grailCard" style="margin-top:12px"><div class="name">Top Grails</div>${d.grails.length?d.grails.map(c=>`<div class="meta"><b>★ ${safe(c.name)}</b> · ${money(c.value||c.targetBuy)}</div>`).join(""):`<div class="meta">No grails marked yet. Open a card and tap ☆.</div>`}</div><div class="profileCard" style="margin-top:12px"><div class="name">Backup</div><div class="meta">Use this before major changes or future cloud sync.</div><button class="secondary" style="margin-top:12px" onclick="sheet='backup';render()">Backup & Restore</button></div>`
}

function analytics(d){
  const sold=[...d.sold].sort((a,b)=>(b.salePrice-b.value)-(a.salePrice-a.value)),best=sold[0],worst=sold[sold.length-1],reasonStats={}
  d.sold.forEach(c=>{const k=c.reasonSold||"unknown";if(!reasonStats[k])reasonStats[k]={count:0,profit:0};reasonStats[k].count++;reasonStats[k].profit+=Number(c.salePrice||0)-Number(c.value||0)})
  return `<div class="card"><div class="name">Capital Snapshot</div><div class="meta">Invested: <b>${money(d.invested)}</b></div><div class="meta">Inventory Value: <b>${money(d.inventoryValue)}</b></div><div class="meta">Unrealized Upside: <b class="blue">${money(d.unrealizedUpside)}</b></div><div class="meta">Wishlist Target: <b class="purple">${money(d.wishlistTarget)}</b></div><div class="meta">Returned: <b class="green">${money(d.returned)}</b></div><div class="meta">Realized P/L: <b class="${d.profit>=0?"green":"red"}">${d.profit>=0?"+":""}${money(d.profit)}</b></div></div><div class="card"><div class="name">Best Sale</div>${best?saleMini(best):`<div class="meta">No sold cards yet</div>`}</div><div class="card"><div class="name">Worst Sale</div>${worst?saleMini(worst):`<div class="meta">No sold cards yet</div>`}</div><div class="card"><div class="name">Why Cards Were Sold</div>${Object.entries(reasonStats).map(([k,v])=>`<div class="meta">${reasons[k]||k}: <b>${v.count}</b> · <b class="${v.profit>=0?"green":"red"}">${v.profit>=0?"+":""}${money(v.profit)}</b></div>`).join("")||`<div class="meta">No sold reasons yet</div>`}</div>`
}

function saleMini(c){
  const p=Number(c.salePrice||0)-Number(c.value||0)
  return `<div class="meta"><b>${safe(c.name)}</b></div><div class="meta">Sold ${money(c.salePrice)} · Cost ${money(c.value)} · <b class="${p>=0?"green":"red"}">${p>=0?"+":""}${money(p)}</b></div>`
}

function bottomNav(){
  return `<div class="bottomNav">${[["vault","▦","Vault"],["wishlist","♡","Wishlist"],["analytics","▤","Analytics"],["profile","◉","Profile"],["search","⌕","Search"]].map(([s,i,l])=>`<button class="navBtn ${screen===s?"active":""}" onclick="screen='${s}';render()"><span class="navIcon">${i}</span>${l}</button>`).join("")}</div>`
}

function sheetHTML(){
  if(!sheet)return""

  if(sheet==="backup")return `<div class="sheetBack" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><h2>Backup & Restore</h2><button class="secondary" onclick="exportBackup()">Export JSON Backup</button><input type="file" accept=".json" onchange="importBackup(event)" /><button class="primary" onclick="sheet=null;render()">Close</button></div></div>`

  if(sheet==="add")return `<div class="sheetBack" onclick="sheet=null;render()"><div class="sheet compactSheet" onclick="event.stopPropagation()"><div class="sheetHandle"></div><h2>Add Card</h2><input id="name" placeholder="Card name" oninput="const w=document.getElementById('dupWarn');const c=duplicateCount(this.value);w.innerHTML=c?'⚠ Duplicate detected: '+c+' existing':''" /><div id="dupWarn" class="warning"></div><div class="row"><input id="value" type="number" placeholder="Cost $" /><input id="psa" type="number" placeholder="PSA10 $" /></div><select id="bucket"><option value="H">Hold</option><option value="G">Grade</option><option value="T">Trade</option><option value="S">Sell</option><option value="W">Wishlist</option></select><button class="secondary" onclick="advancedAdd=!advancedAdd;render()">Advanced Details ${advancedAdd?"▴":"▾"}</button><div class="advancedBox ${advancedAdd?"open":""}"><div class="row"><input id="setName" placeholder="Set / Expansion" /><select id="language"><option value="EN">English</option><option value="JP">Japanese</option><option value="KR">Korean</option><option value="ES">Spanish</option></select></div><div class="row"><select id="rarity"><option value="">Rarity</option><option>Common</option><option>Holo</option><option>Ultra Rare</option><option>Illustration Rare</option><option>SIR</option><option>Promo</option></select><select id="folder"><option>Main Collection</option><option>Business Inventory</option><option>Personal Collection</option><option>Grading Candidates</option><option>For Sale</option></select></div><div class="row"><select id="type"><option>Raw</option><option>Slab</option></select><input id="targetBuy" type="number" placeholder="Target buy $" /></div><div class="section">Purchase Journal</div><input id="purchaseSource" placeholder="Where did you buy it?" /><input id="purchaseDate" type="date" /><textarea id="purchaseNote" placeholder="Purchase notes"></textarea></div><div class="stickySave"><button class="primary" onclick="addCardFromForm()">Save Card</button></div></div></div>`

  const c=cards.find(x=>x.id===selectedId)
  if(!c)return""

  if(sheet==="edit")return `<div class="sheetBack" onclick="sheet='manage';render()"><div class="sheet" onclick="event.stopPropagation()"><h2>Edit Card</h2><input id="editName" value="${safe(c.name||"")}" /><input id="editValue" type="number" value="${c.value||0}" /><input id="editPSA" type="number" value="${c.psa||0}" /><input id="editTarget" type="number" value="${c.targetBuy||0}" placeholder="Target buy $" /><input id="editSet" value="${safe(c.setName||"")}" placeholder="Set / Expansion" /><select id="editLang">${["EN","JP","KR","ES"].map(x=>`<option value="${x}" ${c.language===x?"selected":""}>${x}</option>`).join("")}</select><select id="editRarity">${["","Common","Holo","Ultra Rare","Illustration Rare","SIR","Promo"].map(x=>`<option value="${x}" ${c.rarity===x?"selected":""}>${x||"Rarity"}</option>`).join("")}</select><select id="editFolder">${["Main Collection","Business Inventory","Personal Collection","Grading Candidates","For Sale"].map(x=>`<option ${c.folder===x?"selected":""}>${x}</option>`).join("")}</select><select id="editType"><option ${c.type==="Raw"?"selected":""}>Raw</option><option ${c.type==="Slab"?"selected":""}>Slab</option></select><select id="editBucket">${["H","G","T","S","W"].map(b=>`<option value="${b}" ${c.bucket===b?"selected":""}>${buckets[b]}</option>`).join("")}</select><div class="section">Purchase Journal</div><input id="editPurchaseSource" value="${safe(c.purchaseSource||"")}" placeholder="Where did you buy it?" /><input id="editPurchaseDate" type="date" value="${safe(c.purchaseDate||"")}" /><textarea id="editPurchaseNote" placeholder="Purchase notes">${safe(c.purchaseNote||"")}</textarea><button class="primary" onclick="updateCard()">Save Changes</button></div></div>`

  if(sheet==="price")return `<div class="sheetBack" onclick="sheet='manage';render()"><div class="sheet" onclick="event.stopPropagation()"><h2>Price Snapshot</h2><p>${safe(c.name)}</p><input id="priceLog" type="number" placeholder="Current price $" /><input id="priceNote" placeholder="Source / note" /><button class="primary" onclick="addPriceLog()">Save Price</button></div></div>`

  return `<div class="sheetBack" onclick="sheet=null;render()"><div class="sheet" onclick="event.stopPropagation()"><h2>${safe(c.name)}</h2><p>${c.type||"Raw"} · ${getAnchor(c.name)} · ${buckets[c.bucket]}</p><button class="secondary" onclick="toggleFavorite(${c.id})">${c.favorite?"Remove Grail ★":"Mark as Grail ☆"}</button><div class="section">Card Actions</div><button class="secondary" onclick="sheet='edit';render()">Edit Card</button><button class="secondary" onclick="sheet='price';render()">Add Price Snapshot</button>${(c.status==="sold"||c.status==="traded"||c.status==="wishlist")?`<button class="secondary" onclick="restoreCard()">Restore to Inventory</button>`:""}<div class="section">Move</div>${["H","G","T","S","W"].map(b=>`<button class="secondary" onclick="moveCard('${b}')">Move to ${buckets[b]}</button>`).join("")}<div class="section">Sell / Trade</div><input id="saleInput" type="number" placeholder="Sale price $" /><select id="reasonInput"><option value="">Reason Sold</option><option value="flip">Quick Flip</option><option value="cash">Need Cash</option><option value="drop">Market Drop</option><option value="overpay">Overpaid</option><option value="upgrade">Upgrade Capital</option></select><button class="secondary" onclick="markSold()">Mark Sold</button><input id="tradeInput" placeholder="Traded for what?" /><button class="secondary" onclick="markTraded()">Mark Traded</button><div class="section">Danger Zone</div><button class="secondary danger" onclick="deleteCard()">Delete Permanently</button><button class="primary" onclick="sheet=null;render()">Close</button></div></div>`
}

render()
</script>
</body>
</html>
